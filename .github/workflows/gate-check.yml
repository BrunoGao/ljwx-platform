name: Gate Check

on:
  pull_request:
    branches: [master, main, develop]
  push:
    branches: [master, main]
  merge_group:
    branches: [master, main, develop]
  workflow_dispatch:
    inputs:
      test_env:
        description: "Gate runtime target: ci or k3s"
        required: false
        default: "ci"
        type: choice
        options:
          - ci
          - k3s

permissions:
  contents: read
  issues: read
  repository-projects: write

concurrency:
  group: gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: gate
    if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.test_env == 'k3s') }}
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ljwx_platform
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ljwx_platform"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve base/head sha
        id: sha
        shell: bash
        run: |
          set -euo pipefail
          event="${{ github.event_name }}"
          if [[ "$event" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          elif [[ "$event" == "merge_group" ]]; then
            base="${{ github.event.merge_group.base_sha }}"
            head="${{ github.event.merge_group.head_sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
          fi

          echo "base_sha=$base" >> "$GITHUB_OUTPUT"
          echo "head_sha=$head" >> "$GITHUB_OUTPUT"
          echo "Base SHA: $base"
          echo "Head SHA: $head"

      - name: Collect changed files
        shell: bash
        run: |
          set -euo pipefail
          base="${{ steps.sha.outputs.base_sha }}"
          head="${{ steps.sha.outputs.head_sha }}"
          if [[ -n "$base" && "$base" != "0000000000000000000000000000000000000000" ]]; then
            git diff --name-only "$base" "$head" > changed_files.txt
          else
            git ls-files > changed_files.txt
          fi

          echo "Changed files:"
          sed -n '1,200p' changed_files.txt

      - name: Detect phase (conservative)
        id: phase
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/detect-phase.sh
          phase="$(scripts/detect-phase.sh changed_files.txt || true)"
          if [[ "$phase" == "all" ]]; then
            phase=""
          fi
          echo "phase=$phase" >> "$GITHUB_OUTPUT"
          if [[ -n "$phase" ]]; then
            echo "Detected phase: $phase"
          else
            echo "No reliable phase detected. Running full gate suite."
          fi

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Install PostgreSQL client
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v psql >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y postgresql-client
          fi
          psql --version

      - name: Wait for PostgreSQL
        shell: bash
        run: |
          set -euo pipefail
          for i in {1..30}; do
            if (echo > /dev/tcp/127.0.0.1/5432) >/dev/null 2>&1; then
              echo "PostgreSQL is ready"
              exit 0
            fi
            sleep 2
          done
          echo "PostgreSQL is not reachable on 127.0.0.1:5432" >&2
          exit 1

      - name: Run gate suite
        shell: bash
        env:
          CHANGED_FILES_FILE: changed_files.txt
          R09_STRATIFIED: ${{ github.event_name == 'pull_request' || github.event_name == 'merge_group' }}
          BASELINE_RUNTIME_VERIFY: "true"
          SKIP_HEAVY_GATES: ${{ github.event_name == 'pull_request' }}
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_NAME: ljwx_platform
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
        run: |
          set -euo pipefail
          phase="${{ steps.phase.outputs.phase }}"
          if [[ -n "$phase" ]]; then
            bash scripts/gates/gate-all.sh "$phase" 2>&1 | tee gate.log
          else
            bash scripts/gates/gate-all.sh 2>&1 | tee gate.log
          fi

      - name: Sync Gate Status To Project
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN != '' && secrets.PROJECT_TOKEN || (secrets.PROJECT_V2_TOKEN != '' && secrets.PROJECT_V2_TOKEN || github.token) }}
          PROJECT_V2_ID: ${{ secrets.PROJECT_V2_ID }}
        run: |
          set -euo pipefail
          phase="${{ steps.phase.outputs.phase }}"
          if [[ -z "$phase" ]]; then
            echo "Skip gate status sync: no single phase detected."
            exit 0
          fi

          if [[ ! -f ".github/projectv2/project.json" ]]; then
            if [[ -n "${PROJECT_V2_ID:-}" ]]; then
              bash scripts/project/project-bootstrap.sh --project-id "${PROJECT_V2_ID}" --apply
            else
              echo "Skip gate status sync: missing .github/projectv2/project.json and PROJECT_V2_ID secret."
              exit 0
            fi
          fi

          phase_fmt="$(printf '%02d' "$phase")"
          phase_json="docs/reports/data/phases/phase-${phase_fmt}.json"
          status="PENDING"

          if [[ -f "$phase_json" ]]; then
            status="$(jq -r '.status // "PENDING"' "$phase_json" | tr '[:lower:]' '[:upper:]')"
          fi

          case "$status" in
            PASS|FAIL|PENDING|SKIP) ;;
            *) status="PENDING" ;;
          esac

          if ! bash scripts/project/project-sync-gate-status.sh \
            --phase "$phase" \
            --status "$status" \
            --apply; then
            echo "Gate status sync failed; keep CI green and continue."
          fi

      - name: Upload gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate-log
          path: |
            gate.log
            changed_files.txt

      - name: Upload quality reports for Pages
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate-reports
          path: |
            docs/reports/**
            **/target/surefire-reports/**
            **/target/failsafe-reports/**

  gate-k3s:
    name: gate-k3s
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.test_env == 'k3s') || vars.GATE_CHECK_ENABLE_K3S == 'true' }}
    runs-on: [self-hosted, k3s-local]
    timeout-minutes: 45
    env:
      APP_NAMESPACE: ${{ vars.K3S_APP_NAMESPACE != '' && vars.K3S_APP_NAMESPACE || 'ljwx-platform' }}
      APP_SERVICE: ${{ vars.K3S_APP_SERVICE != '' && vars.K3S_APP_SERVICE || 'ljwx-platform' }}
      APP_SERVICE_PORT: ${{ vars.K3S_APP_SERVICE_PORT != '' && vars.K3S_APP_SERVICE_PORT || '80' }}
      MONITORING_NAMESPACE: ${{ vars.K3S_MONITORING_NAMESPACE != '' && vars.K3S_MONITORING_NAMESPACE || 'monitoring' }}
      PROM_SERVICE: ${{ vars.K3S_PROM_SERVICE != '' && vars.K3S_PROM_SERVICE || 'prometheus-kube-prometheus-prometheus' }}
      LOKI_NAMESPACE: ${{ vars.K3S_LOKI_NAMESPACE != '' && vars.K3S_LOKI_NAMESPACE || 'logging' }}
      LOKI_SERVICE: ${{ vars.K3S_LOKI_SERVICE != '' && vars.K3S_LOKI_SERVICE || 'loki' }}
      TRACING_NAMESPACE: ${{ vars.K3S_TRACING_NAMESPACE != '' && vars.K3S_TRACING_NAMESPACE || 'tracing' }}
      TEMPO_SERVICE: ${{ vars.K3S_TEMPO_SERVICE != '' && vars.K3S_TEMPO_SERVICE || 'tempo' }}
      SERVICE_NAME: ${{ vars.K3S_SERVICE_NAME != '' && vars.K3S_SERVICE_NAME || 'ljwx-platform' }}
      STRICT_TEMPO_SEARCH: "0"
      K6_VUS_R10: "1"
      K6_ITERATIONS_R10: "1"
      K6_VUS_R11: "6"
      K6_DURATION_R11: "45s"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kubectl (no sudo)
        shell: bash
        run: |
          set -euo pipefail
          BIN_DIR="${RUNNER_TEMP}/bin"
          mkdir -p "${BIN_DIR}"
          KUBECTL_BIN="kubectl"
          if ! command -v kubectl >/dev/null 2>&1; then
            curl -sSL -o "${BIN_DIR}/kubectl" "https://dl.k8s.io/release/$(curl -sSL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
            chmod +x "${BIN_DIR}/kubectl"
            echo "${BIN_DIR}" >> "${GITHUB_PATH}"
            KUBECTL_BIN="${BIN_DIR}/kubectl"
          fi
          "${KUBECTL_BIN}" version --client

      - name: Validate tools
        shell: bash
        run: |
          set -euo pipefail
          command -v kubectl >/dev/null
          command -v jq >/dev/null
          command -v curl >/dev/null

      - name: Configure kubeconfig
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ secrets.KUBE_CONFIG_B64 }}" ]; then
            KUBECONFIG_PATH="${RUNNER_TEMP}/kubeconfig"
            echo "${{ secrets.KUBE_CONFIG_B64 }}" | base64 -d > "${KUBECONFIG_PATH}"
            chmod 600 "${KUBECONFIG_PATH}"
            echo "KUBECONFIG=${KUBECONFIG_PATH}" >> "${GITHUB_ENV}"
            exit 0
          fi
          if [ -r "/etc/rancher/k3s/k3s.yaml" ]; then
            echo "KUBECONFIG=/etc/rancher/k3s/k3s.yaml" >> "${GITHUB_ENV}"
            exit 0
          fi
          echo "[FATAL] kubeconfig not found. Provide KUBE_CONFIG_B64 or make /etc/rancher/k3s/k3s.yaml readable."
          exit 1

      - name: Verify cluster access
        shell: bash
        run: |
          set -euo pipefail
          kubectl cluster-info
          kubectl get nodes -o wide

      - name: Run k3s business gate
        id: k3s_gate
        shell: bash
        run: |
          set -euo pipefail
          run_r11=0
          if [[ "${{ github.event_name }}" == "push" || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            run_r11=1
          fi

          RUN_R10=1 RUN_R11="${run_r11}" bash scripts/check-observability-k3s.sh

          REPORT_FILE="/tmp/ljwx-gate-results/observability-e2e.json"
          r10_status="$(jq -r '.gates.r10.status // "UNKNOWN"' "${REPORT_FILE}" 2>/dev/null || true)"
          r11_status="$(jq -r '.gates.r11.status // "SKIP"' "${REPORT_FILE}" 2>/dev/null || true)"
          summary_status="$(jq -r '.status // "UNKNOWN"' "${REPORT_FILE}" 2>/dev/null || true)"

          echo "r10_status=${r10_status}" >> "$GITHUB_OUTPUT"
          echo "r11_status=${r11_status}" >> "$GITHUB_OUTPUT"
          echo "summary_status=${summary_status}" >> "$GITHUB_OUTPUT"

      - name: Upload k3s gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate-k3s-reports
          path: |
            /tmp/ljwx-gate-results/**
            /tmp/ljwx-gate-results/observability/**

      - name: Fail when k3s gate failed
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ steps.k3s_gate.outputs.summary_status }}" != "PASS" ]]; then
            echo "k3s gate failed: summary=${{ steps.k3s_gate.outputs.summary_status }} R10=${{ steps.k3s_gate.outputs.r10_status }} R11=${{ steps.k3s_gate.outputs.r11_status }}" >&2
            exit 1
          fi
