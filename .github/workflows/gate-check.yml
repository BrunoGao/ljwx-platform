name: Gate Check

on:
  pull_request:
    branches: [master, main, develop]
  merge_group:
    branches: [master, main, develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: gate
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ljwx_platform
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ljwx_platform"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve base/head sha
        id: sha
        shell: bash
        run: |
          set -euo pipefail
          event="${{ github.event_name }}"
          if [[ "$event" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          elif [[ "$event" == "merge_group" ]]; then
            base="${{ github.event.merge_group.base_sha }}"
            head="${{ github.event.merge_group.head_sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
          fi

          echo "base_sha=$base" >> "$GITHUB_OUTPUT"
          echo "head_sha=$head" >> "$GITHUB_OUTPUT"
          echo "Base SHA: $base"
          echo "Head SHA: $head"

      - name: Collect changed files
        shell: bash
        run: |
          set -euo pipefail
          base="${{ steps.sha.outputs.base_sha }}"
          head="${{ steps.sha.outputs.head_sha }}"
          if [[ -n "$base" && "$base" != "0000000000000000000000000000000000000000" ]]; then
            git diff --name-only "$base" "$head" > changed_files.txt
          else
            git ls-files > changed_files.txt
          fi

          echo "Changed files:"
          sed -n '1,200p' changed_files.txt

      - name: Detect phase (conservative)
        id: phase
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/detect-phase.sh
          phase="$(scripts/detect-phase.sh changed_files.txt || true)"
          if [[ "$phase" == "all" ]]; then
            phase=""
          fi
          echo "phase=$phase" >> "$GITHUB_OUTPUT"
          if [[ -n "$phase" ]]; then
            echo "Detected phase: $phase"
          else
            echo "No reliable phase detected. Running full gate suite."
          fi

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Wait for PostgreSQL
        shell: bash
        run: |
          set -euo pipefail
          for i in {1..30}; do
            if (echo > /dev/tcp/127.0.0.1/5432) >/dev/null 2>&1; then
              echo "PostgreSQL is ready"
              exit 0
            fi
            sleep 2
          done
          echo "PostgreSQL is not reachable on 127.0.0.1:5432" >&2
          exit 1

      - name: Run gate suite
        shell: bash
        run: |
          set -euo pipefail
          phase="${{ steps.phase.outputs.phase }}"
          if [[ -n "$phase" ]]; then
            bash scripts/gates/gate-all.sh "$phase" 2>&1 | tee gate.log
          else
            bash scripts/gates/gate-all.sh 2>&1 | tee gate.log
          fi

      - name: Upload gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate-log
          path: |
            gate.log
            changed_files.txt
