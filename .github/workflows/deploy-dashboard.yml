name: Deploy Quality Dashboard

on:
  workflow_run:
    workflows: ["Gate Check", "Post Merge E2E", "Nightly Regression"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  pages: write
  id-token: write

concurrency:
  group: pages-dashboard
  cancel-in-progress: true

jobs:
  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        (
          github.event.workflow_run.head_branch == 'master' ||
          github.event.workflow_run.head_branch == 'main'
        )
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (manual fallback)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Download gate reports artifact
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v8
        with:
          name: gate-reports
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
          path: _site

      - name: Resolve Pages source directory
        id: src
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            if [[ -d "_site/docs/reports" ]]; then
              echo "path=_site/docs/reports" >> "$GITHUB_OUTPUT"
            elif [[ -d "_site" ]]; then
              echo "path=_site" >> "$GITHUB_OUTPUT"
            else
              echo "Expected report artifact not found" >&2
              exit 1
            fi
          else
            echo "path=docs/reports" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.src.outputs.path }}

      - name: Deploy
        uses: actions/deploy-pages@v4
