name: Nightly Regression

on:
  schedule:
    - cron: "30 3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  repository-projects: write

jobs:
  nightly_regression:
    runs-on: [self-hosted, k3s-local]
    env:
      GH_TOKEN: ${{ github.token }}
      APP_NAMESPACE: ljwx-platform
      APP_SERVICE: ljwx-platform
      APP_SERVICE_PORT: "80"
      MONITORING_NAMESPACE: monitoring
      PROM_SERVICE: prometheus-kube-prometheus-prometheus
      LOKI_NAMESPACE: logging
      LOKI_SERVICE: loki
      TRACING_NAMESPACE: tracing
      TEMPO_SERVICE: tempo
      SERVICE_NAME: ljwx-platform
      STRICT_TEMPO_SEARCH: "0"
      TENANT_A_USER: ${{ secrets.E2E_TENANT_A_USER || 'admin' }}
      TENANT_A_PASS: ${{ secrets.E2E_TENANT_A_PASS || 'Admin@12345' }}
      TENANT_B_USER: ${{ secrets.E2E_TENANT_B_USER || 'tenantB_admin' }}
      TENANT_B_PASS: ${{ secrets.E2E_TENANT_B_PASS || 'Admin@12345' }}
      TENANT_B_PASS_HASH: ${{ secrets.E2E_TENANT_B_PASS_HASH || '' }}
      K6_VUS_R10: "1"
      K6_ITERATIONS_R10: "1"
      K6_VUS_R11: "6"
      K6_DURATION_R11: "45s"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kubectl (no sudo)
        shell: bash
        run: |
          set -euo pipefail
          BIN_DIR="${RUNNER_TEMP}/bin"
          mkdir -p "${BIN_DIR}"
          KUBECTL_BIN="kubectl"
          if ! command -v kubectl >/dev/null 2>&1; then
            curl -sSL -o "${BIN_DIR}/kubectl" "https://dl.k8s.io/release/$(curl -sSL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
            chmod +x "${BIN_DIR}/kubectl"
            echo "${BIN_DIR}" >> "${GITHUB_PATH}"
            KUBECTL_BIN="${BIN_DIR}/kubectl"
          fi
          "${KUBECTL_BIN}" version --client

      - name: Validate tools
        shell: bash
        run: |
          set -euo pipefail
          command -v jq >/dev/null
          command -v kubectl >/dev/null
          command -v curl >/dev/null

      - name: Configure kubeconfig
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ secrets.KUBE_CONFIG_B64 }}" ]; then
            KUBECONFIG_PATH="${RUNNER_TEMP}/kubeconfig"
            echo "${{ secrets.KUBE_CONFIG_B64 }}" | base64 -d > "${KUBECONFIG_PATH}"
            chmod 600 "${KUBECONFIG_PATH}"
            echo "KUBECONFIG=${KUBECONFIG_PATH}" >> "${GITHUB_ENV}"
            exit 0
          fi
          if [ -r "/etc/rancher/k3s/k3s.yaml" ]; then
            echo "KUBECONFIG=/etc/rancher/k3s/k3s.yaml" >> "${GITHUB_ENV}"
            exit 0
          fi
          echo "[FATAL] kubeconfig not found. Provide KUBE_CONFIG_B64 or make /etc/rancher/k3s/k3s.yaml readable."
          exit 1

      - name: Verify cluster access
        shell: bash
        run: |
          set -euo pipefail
          kubectl cluster-info
          kubectl get nodes -o wide

      - name: Run R10 + R11 on k3s
        id: k3s_gate
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          status="PASS"
          if ! RUN_R10=1 RUN_R11=1 bash scripts/check-observability-k3s.sh; then
            status="FAIL"
          fi

          REPORT_FILE="/tmp/ljwx-gate-results/observability-e2e.json"
          r10_status="$(jq -r '.gates.r10.status // "UNKNOWN"' "${REPORT_FILE}" 2>/dev/null || true)"
          r11_status="$(jq -r '.gates.r11.status // "UNKNOWN"' "${REPORT_FILE}" 2>/dev/null || true)"

          if [[ -z "${r10_status}" || "${r10_status}" == "null" ]]; then
            r10_status="$status"
          fi
          if [[ -z "${r11_status}" || "${r11_status}" == "null" ]]; then
            r11_status="$status"
          fi

          echo "status=$status" >> "$GITHUB_OUTPUT"
          echo "r10_status=${r10_status}" >> "$GITHUB_OUTPUT"
          echo "r11_status=${r11_status}" >> "$GITHUB_OUTPUT"

      - name: Build report payload
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          TMP_DIR=/tmp/ljwx-gate-results
          mkdir -p "$TMP_DIR"
          bash scripts/gen-rtm.sh || true
          bash scripts/gates/gate-report.sh 00 "$TMP_DIR"
          bash scripts/gates/gate-summary.sh

      - name: Create regression issue on failure
        if: always() && (steps.k3s_gate.outputs.r10_status == 'FAIL' || steps.k3s_gate.outputs.r11_status == 'FAIL')
        shell: bash
        run: |
          set -euo pipefail
          run_url="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          gate="R10"
          if [[ "${{ steps.k3s_gate.outputs.r11_status }}" == "FAIL" ]]; then gate="R11"; fi
          title="[Bug][Regression][P0] Nightly ${gate} regression detected"
          if [[ "$gate" == "R10" ]]; then
            title="[Bug][Regression][P0] Cross-tenant access must return 404 (nightly)"
          fi
          gh issue create \
            --repo "${GITHUB_REPOSITORY}" \
            --title "$title" \
            --label "type:bugfix" \
            --label "priority:P0" \
            --label "gate:fail" \
            --body "Automated nightly regression detection.\n\n- Run URL: ${run_url}\n- Gate: ${gate}\n- R10 expected: cross-tenant access MUST return HTTP 404\n- R11 mode: baseline observation (no threshold)\n\nPlease triage and link fix PR." || true

      - name: Update weekly regression campaign
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          overall="PASS"
          if [[ "${{ steps.k3s_gate.outputs.r10_status }}" != "PASS" || "${{ steps.k3s_gate.outputs.r11_status }}" != "PASS" ]]; then
            overall="FAIL"
          fi
          if ! bash scripts/regression/regression-weekly.sh --mode nightly --status "$overall" --apply; then
            echo "weekly campaign update failed; continue workflow" >&2
          fi

      - name: Upload gate reports for Pages
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate-reports
          path: |
            docs/reports/**
            tests/results/**
            /tmp/ljwx-gate-results/**
            /tmp/ljwx-gate-results/observability/**

      - name: Fail workflow on regression
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ steps.k3s_gate.outputs.r10_status }}" != "PASS" || "${{ steps.k3s_gate.outputs.r11_status }}" != "PASS" ]]; then
            echo "Nightly regression detected: R10=${{ steps.k3s_gate.outputs.r10_status }} R11=${{ steps.k3s_gate.outputs.r11_status }}" >&2
            exit 1
          fi
