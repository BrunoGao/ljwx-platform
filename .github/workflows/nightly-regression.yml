name: Nightly Regression

on:
  schedule:
    - cron: "30 3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  repository-projects: write

jobs:
  nightly_regression:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ljwx_platform
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ljwx_platform"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      GH_TOKEN: ${{ github.token }}
      BASE_URL: http://localhost:8080
      ENABLE_E2E: "1"
      LOGIN_PATH: /api/auth/login
      FORBIDDEN_PATH: /api/users
      RESOURCE_LIST_PATH: /api/v1/menus
      TENANT_A_USER: admin
      TENANT_A_PASS: Admin@12345
      TENANT_B_USER: tenantB_admin
      TENANT_B_PASS: Admin@12345
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Validate tools
        shell: bash
        run: |
          set -euo pipefail
          command -v jq >/dev/null
          command -v gh >/dev/null
          command -v docker >/dev/null

      - name: Build and install all modules
        shell: bash
        run: |
          set -euo pipefail
          mvn install -DskipTests -q

      - name: Wait for PostgreSQL
        shell: bash
        run: |
          set -euo pipefail
          for i in {1..30}; do
            if (echo > /dev/tcp/127.0.0.1/5432) >/dev/null 2>&1; then
              echo "PostgreSQL is ready"
              exit 0
            fi
            sleep 2
          done
          echo "PostgreSQL is not reachable on 127.0.0.1:5432" >&2
          exit 1

      - name: Wait for Redis
        shell: bash
        run: |
          set -euo pipefail
          for i in {1..30}; do
            if (echo > /dev/tcp/127.0.0.1/6379) >/dev/null 2>&1; then
              echo "Redis is ready"
              exit 0
            fi
            sleep 2
          done
          echo "Redis is not reachable on 127.0.0.1:6379" >&2
          exit 1

      - name: Start app locally
        shell: bash
        run: |
          set -euo pipefail
          SPRING_PROFILES_ACTIVE=test,dev \
          SPRING_DATASOURCE_URL='jdbc:postgresql://127.0.0.1:5432/ljwx_platform' \
          SPRING_DATASOURCE_USERNAME=postgres \
          SPRING_DATASOURCE_PASSWORD=postgres \
          REDIS_HOST=127.0.0.1 \
          REDIS_PORT=6379 \
          mvn -f ljwx-platform-app/pom.xml \
            -e \
            -DskipTests \
            -Dspring-boot.run.profiles=test,dev \
            -Dspring-boot.run.useTestClasspath=true \
            spring-boot:run > app.log 2>&1 &
          echo $! > app.pid

      - name: Wait app health
        shell: bash
        run: |
          set -euo pipefail
          for i in {1..240}; do
            if [[ -f app.pid ]] && ! kill -0 "$(cat app.pid)" 2>/dev/null; then
              echo "app process exited before health check passed" >&2
              tail -n 300 app.log || true
              exit 1
            fi
            if curl -fsS "${BASE_URL}/actuator/health" >/dev/null 2>&1; then
              echo "app is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "app health check timeout" >&2
          tail -n 200 app.log || true
          exit 1

      - name: Seed E2E fixtures
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/e2e/seed-fixtures.sh

      - name: Run R10 E2E
        id: r10
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          status="PASS"
          if ! bash scripts/gates/gate-e2e.sh; then
            status="FAIL"
          fi
          echo "status=$status" >> "$GITHUB_OUTPUT"

      - name: Run R11 Perf baseline
        id: r11
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          status="PASS"
          if ! bash scripts/gates/gate-perf.sh; then
            status="FAIL"
          fi
          echo "status=$status" >> "$GITHUB_OUTPUT"

      - name: Build report payload
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          TMP_DIR=/tmp/ljwx-gate-results
          mkdir -p "$TMP_DIR"
          bash scripts/gen-rtm.sh || true
          bash scripts/gates/gate-report.sh 00 "$TMP_DIR"
          bash scripts/gates/gate-summary.sh

      - name: Create regression issue on failure
        if: always() && (steps.r10.outputs.status == 'FAIL' || steps.r11.outputs.status == 'FAIL')
        shell: bash
        run: |
          set -euo pipefail
          run_url="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          gate="R10"
          if [[ "${{ steps.r11.outputs.status }}" == "FAIL" ]]; then gate="R11"; fi
          title="[Bug][Regression][P0] Nightly ${gate} regression detected"
          if [[ "$gate" == "R10" ]]; then
            title="[Bug][Regression][P0] Cross-tenant access must return 404 (nightly)"
          fi
          gh issue create \
            --repo "${GITHUB_REPOSITORY}" \
            --title "$title" \
            --label "type:bugfix" \
            --label "priority:P0" \
            --label "gate:fail" \
            --body "Automated nightly regression detection.\n\n- Run URL: ${run_url}\n- Gate: ${gate}\n- R10 expected: cross-tenant access MUST return HTTP 404\n- R11 mode: baseline observation (no threshold)\n\nPlease triage and link fix PR." || true

      - name: Update weekly regression campaign
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          overall="PASS"
          if [[ "${{ steps.r10.outputs.status }}" != "PASS" || "${{ steps.r11.outputs.status }}" != "PASS" ]]; then
            overall="FAIL"
          fi
          if ! bash scripts/regression/regression-weekly.sh --mode nightly --status "$overall" --apply; then
            echo "weekly campaign update failed; continue workflow" >&2
          fi

      - name: Upload gate reports for Pages
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate-reports
          path: |
            docs/reports/**
            tests/results/**
            app.log

      - name: Teardown test environment
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f app.pid ]]; then kill "$(cat app.pid)" || true; fi

      - name: Fail workflow on regression
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ steps.r10.outputs.status }}" != "PASS" || "${{ steps.r11.outputs.status }}" != "PASS" ]]; then
            echo "Nightly regression detected: R10=${{ steps.r10.outputs.status }} R11=${{ steps.r11.outputs.status }}" >&2
            exit 1
          fi
