name: Nightly Regression

on:
  schedule:
    - cron: "30 3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  repository-projects: write

jobs:
  nightly_regression:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.PROJECT_TOKEN != '' && secrets.PROJECT_TOKEN || (secrets.PROJECT_V2_TOKEN != '' && secrets.PROJECT_V2_TOKEN || github.token) }}
      BASE_URL: http://localhost:8080
      ENABLE_E2E: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Validate tools
        shell: bash
        run: |
          set -euo pipefail
          command -v jq >/dev/null
          command -v gh >/dev/null
          command -v docker >/dev/null

      - name: Start MySQL/Redis test environment
        shell: bash
        run: |
          set -euo pipefail
          START_APP_CONTAINER=false bash scripts/setup-test-env.sh up

      - name: Start app locally
        shell: bash
        run: |
          set -euo pipefail
          SPRING_PROFILES_ACTIVE=test \
          SPRING_DATASOURCE_URL='jdbc:mysql://127.0.0.1:3307/ljwx_platform?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC' \
          SPRING_DATASOURCE_USERNAME=ljwx \
          SPRING_DATASOURCE_PASSWORD=ljwx \
          SPRING_REDIS_HOST=127.0.0.1 \
          SPRING_REDIS_PORT=6380 \
          ./mvnw -pl ljwx-platform-app -am -DskipTests spring-boot:run > app.log 2>&1 &
          echo $! > app.pid

      - name: Wait app health
        shell: bash
        run: |
          set -euo pipefail
          for i in {1..90}; do
            if curl -fsS "${BASE_URL}/actuator/health" >/dev/null 2>&1; then
              echo "app is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "app health check timeout" >&2
          tail -n 200 app.log || true
          exit 1

      - name: Run R10 E2E
        id: r10
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          status="PASS"
          if ! bash scripts/gates/gate-e2e.sh; then
            status="FAIL"
          fi
          echo "status=$status" >> "$GITHUB_OUTPUT"

      - name: Run R11 Perf baseline
        id: r11
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          status="PASS"
          if ! bash scripts/gates/gate-perf.sh; then
            status="FAIL"
          fi
          echo "status=$status" >> "$GITHUB_OUTPUT"

      - name: Build report payload
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          TMP_DIR=/tmp/ljwx-gate-results
          mkdir -p "$TMP_DIR"
          bash scripts/gen-rtm.sh || true
          bash scripts/gates/gate-report.sh 00 "$TMP_DIR"
          bash scripts/gates/gate-summary.sh

      - name: Create regression issue on failure
        if: always() && (steps.r10.outputs.status == 'FAIL' || steps.r11.outputs.status == 'FAIL')
        shell: bash
        run: |
          set -euo pipefail
          run_url="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          gate="R10"
          if [[ "${{ steps.r11.outputs.status }}" == "FAIL" ]]; then gate="R11"; fi
          title="[Bug][Regression][P0] Nightly ${gate} regression detected"
          if [[ "$gate" == "R10" ]]; then
            title="[Bug][Regression][P0] Cross-tenant access must return 404 (nightly)"
          fi
          gh issue create \
            --repo "${GITHUB_REPOSITORY}" \
            --title "$title" \
            --label "type:bugfix" \
            --label "priority:P0" \
            --label "gate:fail" \
            --body "Automated nightly regression detection.\n\n- Run URL: ${run_url}\n- Gate: ${gate}\n- R10 expected: cross-tenant access MUST return HTTP 404\n- R11 mode: baseline observation (no threshold)\n\nPlease triage and link fix PR." || true

      - name: Update weekly regression campaign
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          overall="PASS"
          if [[ "${{ steps.r10.outputs.status }}" != "PASS" || "${{ steps.r11.outputs.status }}" != "PASS" ]]; then
            overall="FAIL"
          fi
          bash scripts/regression/regression-weekly.sh --mode nightly --status "$overall" --apply

      - name: Upload gate reports for Pages
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate-reports
          path: |
            docs/reports/**
            tests/results/**
            app.log

      - name: Teardown test environment
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f app.pid ]]; then kill "$(cat app.pid)" || true; fi
          bash scripts/setup-test-env.sh clean || true

      - name: Fail workflow on regression
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ steps.r10.outputs.status }}" != "PASS" || "${{ steps.r11.outputs.status }}" != "PASS" ]]; then
            echo "Nightly regression detected: R10=${{ steps.r10.outputs.status }} R11=${{ steps.r11.outputs.status }}" >&2
            exit 1
          fi
