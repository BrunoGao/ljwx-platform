name: Release To Deploy

on:
  workflow_run:
    workflows: ["build-and-notify"]
    types: [completed]
  workflow_dispatch:
    inputs:
      source_run_id:
        description: "build-and-notify run id (optional; defaults to latest successful run on current branch)"
        required: false
        default: ""
      deploy_repo:
        description: "owner/repo of deploy repository"
        required: false
        default: "BrunoGaoSZ/ljwx-deploy"
      queue_file:
        description: "Queue file path in deploy repo"
        required: false
        default: "release/queue.yaml"
      service:
        description: "service name in deploy queue"
        required: false
        default: "ljwx-platform"
      environment:
        description: "target environment in deploy queue"
        required: false
        default: "prod"

permissions:
  contents: read
  actions: read

concurrency:
  group: release-to-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  enqueue:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') }}
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event_name == 'workflow_dispatch' && ((inputs.environment == 'prod' || inputs.environment == 'production') && 'production' || 'staging') || 'production' }}
    timeout-minutes: 15
    steps:
      - name: Resolve config
        id: cfg
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "source_run_id=${{ github.event.workflow_run.id }}" >> "$GITHUB_OUTPUT"
            echo "deploy_repo=BrunoGaoSZ/ljwx-deploy" >> "$GITHUB_OUTPUT"
            echo "queue_file=release/queue.yaml" >> "$GITHUB_OUTPUT"
            echo "service=ljwx-platform" >> "$GITHUB_OUTPUT"
            echo "environment=prod" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SOURCE_RUN_ID="${{ github.event.inputs.source_run_id }}"
          if [ -z "${SOURCE_RUN_ID}" ]; then
            SOURCE_RUN_ID="$(gh run list \
              --repo "${GITHUB_REPOSITORY}" \
              --workflow "build-and-notify.yml" \
              --branch "${GITHUB_REF_NAME}" \
              --status success \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId')"
          fi

          if [ -z "${SOURCE_RUN_ID}" ] || [ "${SOURCE_RUN_ID}" = "null" ]; then
            echo "failed to resolve source_run_id" >&2
            exit 1
          fi

          echo "source_run_id=${SOURCE_RUN_ID}" >> "$GITHUB_OUTPUT"
          echo "deploy_repo=${{ github.event.inputs.deploy_repo || 'BrunoGaoSZ/ljwx-deploy' }}" >> "$GITHUB_OUTPUT"
          echo "queue_file=${{ github.event.inputs.queue_file || 'release/queue.yaml' }}" >> "$GITHUB_OUTPUT"
          echo "service=${{ github.event.inputs.service || 'ljwx-platform' }}" >> "$GITHUB_OUTPUT"
          echo "environment=${{ github.event.inputs.environment || 'prod' }}" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Download build release metadata
        uses: actions/download-artifact@v4
        with:
          name: release-metadata
          run-id: ${{ steps.cfg.outputs.source_run_id }}
          github-token: ${{ github.token }}
          path: _meta

      - name: Parse backend release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path("_meta/release-metadata.json").read_text(encoding="utf-8"))
          backend = payload["components"]["backend"]
          digest = str(backend["digest"])
          if not digest.startswith("sha256:"):
              raise SystemExit("backend digest is invalid")

          out = Path("/tmp/meta.out")
          out.write_text(
              "\n".join(
                  [
                      f"ghcr_image={backend['image']}",
                      f"ghcr_digest={digest}",
                      f"ghcr_ref={backend['image']}@{digest}",
                      f"release_tag={backend['tag']}",
                      f"source_git_sha={payload['git_sha']}",
                  ]
              )
              + "\n",
              encoding="utf-8",
          )
          PY
          cat /tmp/meta.out >> "$GITHUB_OUTPUT"

      - name: Install PyYAML
        shell: bash
        run: python3 -m pip install --quiet pyyaml

      - name: Clone deploy repo
        env:
          DEPLOY_REPO_TOKEN: ${{ secrets.DEPLOY_REPO_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${DEPLOY_REPO_TOKEN:-}" ]; then
            echo "DEPLOY_REPO_TOKEN is required" >&2
            exit 1
          fi
          git clone \
            "https://x-access-token:${DEPLOY_REPO_TOKEN}@github.com/${{ steps.cfg.outputs.deploy_repo }}.git" \
            deploy-repo

      - name: Enqueue release entry
        id: enqueue
        shell: bash
        env:
          QUEUE_FILE: ${{ steps.cfg.outputs.queue_file }}
          SERVICE: ${{ steps.cfg.outputs.service }}
          ENVIRONMENT: ${{ steps.cfg.outputs.environment }}
          GHCR_REF: ${{ steps.meta.outputs.ghcr_ref }}
          GHCR_DIGEST: ${{ steps.meta.outputs.ghcr_digest }}
          RELEASE_TAG: ${{ steps.meta.outputs.release_tag }}
          SOURCE_GIT_SHA: ${{ steps.meta.outputs.source_git_sha }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import datetime as dt
          import os
          from pathlib import Path

          import yaml

          queue_path = Path("deploy-repo") / os.environ["QUEUE_FILE"]
          if not queue_path.exists():
              raise SystemExit(f"queue file not found: {queue_path}")

          payload = yaml.safe_load(queue_path.read_text(encoding="utf-8")) or {}
          for key in ("pending", "promoted", "failed", "superseded"):
              payload.setdefault(key, [])

          now = dt.datetime.now(dt.timezone.utc)
          created_at = now.strftime("%Y-%m-%dT%H:%M:%SZ")
          compact_ts = now.strftime("%Y%m%dT%H%M%SZ")
          queue_id = f"{compact_ts}-{os.environ['SERVICE']}-{os.environ['RELEASE_TAG']}"

          entry = {
              "id": queue_id,
              "service": os.environ["SERVICE"],
              "env": os.environ["ENVIRONMENT"],
              "source": {
                  "ghcr": os.environ["GHCR_REF"],
                  "tag": os.environ["RELEASE_TAG"],
                  "digest": os.environ["GHCR_DIGEST"],
                  "gitSha": os.environ["SOURCE_GIT_SHA"],
              },
              "createdAt": created_at,
              "status": "pending",
              "attempts": 0,
              "lastError": "",
              "promotedAt": "",
              "supersededAt": "",
              "failedAt": "",
          }

          payload["pending"].append(entry)
          queue_path.write_text(yaml.safe_dump(payload, sort_keys=False), encoding="utf-8")

          Path("/tmp/queue_entry_id").write_text(queue_id, encoding="utf-8")
          PY

          echo "queue_entry_id=$(cat /tmp/queue_entry_id)" >> "$GITHUB_OUTPUT"

      - name: Create queue PR in deploy repo
        working-directory: deploy-repo
        env:
          GH_TOKEN: ${{ secrets.DEPLOY_REPO_TOKEN }}
          QUEUE_FILE: ${{ steps.cfg.outputs.queue_file }}
          QUEUE_ENTRY_ID: ${{ steps.enqueue.outputs.queue_entry_id }}
          SERVICE: ${{ steps.cfg.outputs.service }}
          ENVIRONMENT: ${{ steps.cfg.outputs.environment }}
          SOURCE_RUN_ID: ${{ steps.cfg.outputs.source_run_id }}
          SOURCE_GIT_SHA: ${{ steps.meta.outputs.source_git_sha }}
          GHCR_REF: ${{ steps.meta.outputs.ghcr_ref }}
        shell: bash
        run: |
          set -euo pipefail
          BRANCH="bot/queue-${SERVICE}-${GITHUB_RUN_ID}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "${BRANCH}"
          git add "${QUEUE_FILE}"
          git commit -m "queue(${SERVICE}): ${QUEUE_ENTRY_ID}"
          git push origin "${BRANCH}"

          cat > /tmp/queue-pr-body.md <<EOF
          Automated queue enqueue from ${GITHUB_REPOSITORY}@${SOURCE_GIT_SHA}

          - service: \`${SERVICE}\`
          - env: \`${ENVIRONMENT}\`
          - queue id: \`${QUEUE_ENTRY_ID}\`
          - source run: [${SOURCE_RUN_ID}](https://github.com/${GITHUB_REPOSITORY}/actions/runs/${SOURCE_RUN_ID})
          - backend ghcr: \`${GHCR_REF}\`

          This PR only updates \`${QUEUE_FILE}\` and does not wait for Harbor replication.
          Promoter will check Harbor digest readiness asynchronously.
          EOF

          gh pr create \
            --repo "${{ steps.cfg.outputs.deploy_repo }}" \
            --title "queue(${SERVICE}): ${QUEUE_ENTRY_ID}" \
            --body-file /tmp/queue-pr-body.md \
            --base main \
            --head "${BRANCH}"
