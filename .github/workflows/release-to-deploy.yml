name: Release To Deploy

on:
  push:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      deploy_repo:
        description: "owner/repo of deploy repository"
        required: false
        default: "BrunoGaoSZ/ljwx-deploy"
      overlay_file:
        description: "Path of overlay kustomization inside deploy repo"
        required: false
        default: "apps/ljwx-platform/overlays/prod/kustomization.yaml"

permissions:
  contents: read

concurrency:
  group: release-to-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  HARBOR_HOST: harbor.eu.lingjingwanxiang.cn
  HARBOR_PROJECT: ljwx

jobs:
  # ── Job 1: Build & push backend image (Spring Boot buildpacks) ──────────────
  release-backend:
    name: Release Backend
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      image_name: ${{ steps.meta.outputs.image_name }}
      image_ref: ${{ steps.meta.outputs.image_ref }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
      image_digest: ${{ steps.release.outputs.image_digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_NAME="${HARBOR_HOST}/${HARBOR_PROJECT}/ljwx-platform"
          IMAGE_TAG="${GITHUB_SHA}"
          {
            echo "image_name=${IMAGE_NAME}"
            echo "image_ref=${IMAGE_NAME}:${IMAGE_TAG}"
            echo "image_tag=${IMAGE_TAG}"
          } >> "$GITHUB_OUTPUT"

      - name: Login Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.HARBOR_HOST }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and push backend
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ljwx-platform-app/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.image_ref }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Resolve digest
        id: release
        shell: bash
        run: |
          set -euo pipefail
          echo "image_digest=${{ steps.build.outputs.digest }}" >> "$GITHUB_OUTPUT"

  # ── Job 2: Build & push admin UI image (Dockerfile multi-stage) ────────────
  release-admin-ui:
    name: Release Admin UI
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      image_name: ${{ steps.meta.outputs.image_name }}
      image_ref: ${{ steps.meta.outputs.image_ref }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
      image_digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_NAME="${HARBOR_HOST}/${HARBOR_PROJECT}/ljwx-platform-admin-ui"
          IMAGE_TAG="${GITHUB_SHA}"
          {
            echo "image_name=${IMAGE_NAME}"
            echo "image_ref=${IMAGE_NAME}:${IMAGE_TAG}"
            echo "image_tag=${IMAGE_TAG}"
          } >> "$GITHUB_OUTPUT"

      - name: Login Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.HARBOR_HOST }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          file: ljwx-platform-admin/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.image_ref }}
          cache-from: type=gha,scope=admin-ui
          cache-to: type=gha,scope=admin-ui,mode=max

  # ── Job 3: Build & push screen image (Dockerfile multi-stage) ──────────────
  release-screen:
    name: Release Screen
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      image_name: ${{ steps.meta.outputs.image_name }}
      image_ref: ${{ steps.meta.outputs.image_ref }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
      image_digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_NAME="${HARBOR_HOST}/${HARBOR_PROJECT}/ljwx-platform-screen"
          IMAGE_TAG="${GITHUB_SHA}"
          {
            echo "image_name=${IMAGE_NAME}"
            echo "image_ref=${IMAGE_NAME}:${IMAGE_TAG}"
            echo "image_tag=${IMAGE_TAG}"
          } >> "$GITHUB_OUTPUT"

      - name: Login Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.HARBOR_HOST }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          file: ljwx-platform-screen/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.image_ref }}
          cache-from: type=gha,scope=screen
          cache-to: type=gha,scope=screen,mode=max

  # ── Job 4: Single deploy PR updating all three images in the overlay ────────
  deploy-pr:
    name: Create Deploy PR
    runs-on: ubuntu-latest
    needs: [release-backend, release-admin-ui, release-screen]
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PyYAML
        shell: bash
        run: python3 -m pip install --quiet pyyaml

      - name: Resolve deploy config
        id: cfg
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "deploy_repo=${{ github.event.inputs.deploy_repo || 'BrunoGaoSZ/ljwx-deploy' }}"
            echo "overlay_file=${{ github.event.inputs.overlay_file || 'apps/ljwx-platform/overlays/prod/kustomization.yaml' }}"
          } >> "$GITHUB_OUTPUT"

      - name: Clone deploy repo
        env:
          DEPLOY_REPO_TOKEN: ${{ secrets.DEPLOY_REPO_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${DEPLOY_REPO_TOKEN:-}" ]; then
            echo "DEPLOY_REPO_TOKEN is required" && exit 1
          fi
          git clone \
            "https://x-access-token:${DEPLOY_REPO_TOKEN}@github.com/${{ steps.cfg.outputs.deploy_repo }}.git" \
            deploy-repo

      - name: Update overlay kustomization
        env:
          OVERLAY_FILE: ${{ steps.cfg.outputs.overlay_file }}
          BACKEND_IMAGE_NAME: ${{ needs.release-backend.outputs.image_name }}
          BACKEND_IMAGE_TAG: ${{ needs.release-backend.outputs.image_tag }}
          ADMIN_UI_IMAGE_NAME: ${{ needs.release-admin-ui.outputs.image_name }}
          ADMIN_UI_IMAGE_TAG: ${{ needs.release-admin-ui.outputs.image_tag }}
          SCREEN_IMAGE_NAME: ${{ needs.release-screen.outputs.image_name }}
          SCREEN_IMAGE_TAG: ${{ needs.release-screen.outputs.image_tag }}
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          from pathlib import Path
          import yaml

          overlay = Path("deploy-repo") / os.environ["OVERLAY_FILE"]
          data = yaml.safe_load(overlay.read_text()) or {}

          targets = {
              "ljwx-platform": (
                  os.environ["BACKEND_IMAGE_NAME"],
                  os.environ["BACKEND_IMAGE_TAG"],
              ),
              "ljwx-platform-admin-ui": (
                  os.environ["ADMIN_UI_IMAGE_NAME"],
                  os.environ["ADMIN_UI_IMAGE_TAG"],
              ),
              "ljwx-platform-screen": (
                  os.environ["SCREEN_IMAGE_NAME"],
                  os.environ["SCREEN_IMAGE_TAG"],
              ),
          }

          def infer_component(image_key: str) -> str:
              normalized = image_key.strip()
              for component in targets:
                  if normalized.endswith(f"/{component}") or normalized == component:
                      return component
              return ""

          touched = 0
          for img in data.get("images", []):
              key = str(img.get("newName") or img.get("name") or "")
              component = infer_component(key)
              if not component:
                  continue
              new_name, new_tag = targets[component]
              img["newName"] = new_name
              img["newTag"] = new_tag
              if "digest" in img:
                  del img["digest"]
              touched += 1

          if touched == 0:
              raise SystemExit(
                  f"no images entry matched ljwx-platform components in {overlay}"
              )

          overlay.write_text(yaml.safe_dump(data, sort_keys=False))
          PY

      - name: Create deploy PR
        working-directory: deploy-repo
        env:
          GH_TOKEN: ${{ secrets.DEPLOY_REPO_TOKEN }}
          GIT_SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail
          SHA_SHORT="${GIT_SHA:0:7}"
          BRANCH="bot/release-ljwx-platform-${GITHUB_RUN_ID}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "${BRANCH}"
          git add "${{ steps.cfg.outputs.overlay_file }}"
          git commit -m "release(ljwx-platform): ${SHA_SHORT}"
          git push origin "${BRANCH}"
          gh pr create \
            --repo "${{ steps.cfg.outputs.deploy_repo }}" \
            --title "release(ljwx-platform): ${SHA_SHORT}" \
            --body "Automated release PR from ${{ github.repository }}@${GIT_SHA}

          **Backend** \`${{ needs.release-backend.outputs.image_ref }}\`
          digest: ${{ needs.release-backend.outputs.image_digest }}

          **Admin UI** \`${{ needs.release-admin-ui.outputs.image_ref }}\`
          digest: ${{ needs.release-admin-ui.outputs.image_digest }}

          **Screen** \`${{ needs.release-screen.outputs.image_ref }}\`
          digest: ${{ needs.release-screen.outputs.image_digest }}
          " \
            --base main \
            --head "${BRANCH}"
