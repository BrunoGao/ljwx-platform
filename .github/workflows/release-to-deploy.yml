name: Release To Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      service_name:
        description: "Service name in deploy repo"
        required: false
        default: "ljwx-platform-app"
      deploy_repo:
        description: "owner/repo of deploy repository"
        required: false
        default: "BrunoGaoSZ/ljwx-deploy"
      deploy_values_file:
        description: "Path of service release values YAML inside deploy repo"
        required: false
        default: "apps/ljwx-platform-app/release-values.yaml"
      image_repo:
        description: "Container image repo, e.g. harbor.eu.lingjingwanxiang.cn/ljwx-platform/ljwx-platform-app"
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: release-to-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      OTEL_ENDPOINT_FIXED: otel-collector-opentelemetry-collector.tracing.svc.cluster.local:4317
      HARBOR_HOST: harbor.eu.lingjingwanxiang.cn
      HARBOR_PROJECT: ljwx-platform
      IMAGE_NAME: ljwx-platform-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Install PyYAML
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --quiet pyyaml

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          SERVICE_NAME="${{ github.event.inputs.service_name || 'ljwx-platform-app' }}"
          DEPLOY_REPO="${{ github.event.inputs.deploy_repo || 'BrunoGaoSZ/ljwx-deploy' }}"
          DEPLOY_VALUES_FILE="${{ github.event.inputs.deploy_values_file || 'apps/ljwx-platform-app/release-values.yaml' }}"
          IMAGE_REPO_INPUT="${{ github.event.inputs.image_repo }}"
          if [ -z "$IMAGE_REPO_INPUT" ]; then
            IMAGE_REPO="${HARBOR_HOST}/${HARBOR_PROJECT}/${IMAGE_NAME}"
          else
            IMAGE_REPO="$IMAGE_REPO_INPUT"
          fi
          GIT_SHA="${GITHUB_SHA}"
          SHA_SHORT="${GIT_SHA:0:7}"
          IMAGE_TAG="${GIT_SHA}"
          IMAGE_REF="${IMAGE_REPO}:${IMAGE_TAG}"
          {
            echo "service_name=$SERVICE_NAME"
            echo "deploy_repo=$DEPLOY_REPO"
            echo "deploy_values_file=$DEPLOY_VALUES_FILE"
            echo "git_sha=$GIT_SHA"
            echo "sha_short=$SHA_SHORT"
            echo "image_repo=$IMAGE_REPO"
            echo "image_tag=$IMAGE_TAG"
            echo "image_ref=$IMAGE_REF"
          } >> "$GITHUB_OUTPUT"

      - name: Login Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.HARBOR_HOST }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build image with Spring Boot buildpacks
        shell: bash
        run: |
          set -euo pipefail
          mvn -B -ntp -q \
            -pl ljwx-platform-app \
            -am \
            package \
            -DskipTests
          mvn -B -ntp -q \
            -f ljwx-platform-app/pom.xml \
            spring-boot:build-image \
            -DskipTests \
            -Dspring-boot.build-image.imageName="${{ steps.meta.outputs.image_ref }}"

      - name: Push image
        shell: bash
        run: |
          set -euo pipefail
          docker push "${{ steps.meta.outputs.image_ref }}"

      - name: Resolve digest and release_id
        id: release
        shell: bash
        run: |
          set -euo pipefail
          REPO_DIGEST="$(docker inspect --format='{{index .RepoDigests 0}}' "${{ steps.meta.outputs.image_ref }}")"
          IMAGE_DIGEST="${REPO_DIGEST#*@}"
          DIGEST_SHORT="${IMAGE_DIGEST#sha256:}"
          DIGEST_SHORT="${DIGEST_SHORT:0:12}"
          DEPLOYMENT_ID="${{ steps.meta.outputs.sha_short }}-${DIGEST_SHORT}"
          SERVICE_VERSION="${{ steps.meta.outputs.git_sha }}"
          {
            echo "image=${{ steps.meta.outputs.image_ref }}"
            echo "image_digest=$IMAGE_DIGEST"
            echo "deployment_id=$DEPLOYMENT_ID"
            echo "service_version=$SERVICE_VERSION"
          } >> "$GITHUB_OUTPUT"

      - name: Prepare deploy repo changes
        env:
          DEPLOY_REPO_TOKEN: ${{ secrets.DEPLOY_REPO_TOKEN }}
          DEPLOY_VALUES_FILE: ${{ steps.meta.outputs.deploy_values_file }}
          IMAGE: ${{ steps.release.outputs.image }}
          DEPLOYMENT_ID: ${{ steps.release.outputs.deployment_id }}
          SERVICE_VERSION: ${{ steps.release.outputs.service_version }}
          IMAGE_DIGEST: ${{ steps.release.outputs.image_digest }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${DEPLOY_REPO_TOKEN:-}" ]; then
            echo "DEPLOY_REPO_TOKEN is required"
            exit 1
          fi
          git clone "https://x-access-token:${DEPLOY_REPO_TOKEN}@github.com/${{ steps.meta.outputs.deploy_repo }}.git" deploy-repo
          cp "deploy-repo/${{ steps.meta.outputs.deploy_values_file }}" /tmp/values.before.yaml

          python3 - <<'PY'
          import os
          from pathlib import Path
          import yaml

          values_file = Path("deploy-repo") / os.environ["DEPLOY_VALUES_FILE"]
          data = yaml.safe_load(values_file.read_text()) or {}
          data["image"] = os.environ["IMAGE"]
          data["deploymentId"] = os.environ["DEPLOYMENT_ID"]
          data["serviceVersion"] = os.environ["SERVICE_VERSION"]
          data["imageDigest"] = os.environ["IMAGE_DIGEST"]
          values_file.write_text(yaml.safe_dump(data, sort_keys=False))
          PY

      - name: Validate deploy values hard rules
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/ci/validate-deploy-values.sh \
            --file "deploy-repo/${{ steps.meta.outputs.deploy_values_file }}" \
            --before "/tmp/values.before.yaml" \
            --fixed-otel-endpoint "${OTEL_ENDPOINT_FIXED}"

      - name: Create deploy PR
        working-directory: deploy-repo
        env:
          GH_TOKEN: ${{ secrets.DEPLOY_REPO_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          BRANCH="bot/release-${{ steps.meta.outputs.service_name }}-${GITHUB_RUN_ID}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "${BRANCH}"
          git add "${{ steps.meta.outputs.deploy_values_file }}"
          git commit -m "release(${{ steps.meta.outputs.service_name }}): ${{ steps.release.outputs.deployment_id }}"
          git push origin "${BRANCH}"
          gh pr create \
            --repo "${{ steps.meta.outputs.deploy_repo }}" \
            --title "release(${{ steps.meta.outputs.service_name }}): ${{ steps.release.outputs.deployment_id }}" \
            --body "Automated release PR from ${{ github.repository }}@${{ steps.meta.outputs.git_sha }}

          image: ${{ steps.release.outputs.image }}
          deploymentId: ${{ steps.release.outputs.deployment_id }}
          serviceVersion: ${{ steps.release.outputs.service_version }}
          imageDigest: ${{ steps.release.outputs.image_digest }}
          " \
            --base main \
            --head "${BRANCH}"
