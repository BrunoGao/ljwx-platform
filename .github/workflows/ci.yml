name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Shell script syntax check
        run: bash scripts/ci/lint-shell.sh

      - name: YAML validation
        run: |
          pip install pyyaml --quiet
          bash scripts/ci/lint-yaml.sh

  backend:
    name: Backend
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Backend compile
        run: mvn clean compile -f pom.xml -q

      - name: Backend test
        run: mvn test -f pom.xml -q

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: pnpm/action-setup@v4
        with:
          version: '10.30.1'

      - name: Install dependencies
        run: cd ljwx-platform-admin && pnpm install --frozen-lockfile

      - name: Type check
        run: cd ljwx-platform-admin && pnpm run type-check

      - name: Lint
        run: cd ljwx-platform-admin && pnpm run lint
