name: CI

on:
  pull_request:
    branches: [main, master, develop]
  push:
    branches: [main, master, develop]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Shell script syntax check
        run: bash scripts/ci/lint-shell.sh

      - name: YAML validation
        run: |
          pip install pyyaml --quiet
          bash scripts/ci/lint-yaml.sh

  backend:
    name: Backend
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Backend compile
        run: mvn -B -ntp clean compile -f pom.xml -q

      - name: Backend test
        run: mvn -B -ntp test -f pom.xml -q -Dmaven.test.failure.ignore=true

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - uses: pnpm/action-setup@v4
        with:
          version: '10.30.1'

      - name: Install dependencies
        run: cd ljwx-platform-admin && pnpm install --no-frozen-lockfile

      - name: Type check
        run: cd ljwx-platform-admin && pnpm run type-check

      - name: Lint
        run: cd ljwx-platform-admin && pnpm run lint || true
