name: Governance Drift

on:
  schedule:
    - cron: "20 1 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  governance-drift:
    name: governance-drift
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ secrets.GOVERNANCE_TOKEN != '' && secrets.GOVERNANCE_TOKEN || github.token }}
      EXPECTED_PROTECTED_BRANCHES: main,master
      EXPECTED_REQUIRED_CHECKS: Lint,Backend,Frontend,gate,pr-policy,dependency-review,Gitleaks,Backend JaCoCo
      EXPECTED_ENVIRONMENTS: staging,production
      ALLOW_UNSUPPORTED_ENV_PROTECTION: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate governance drift
        run: |
          set -euo pipefail
          bash scripts/github/check-governance-drift.sh --repo "${GITHUB_REPOSITORY}"
