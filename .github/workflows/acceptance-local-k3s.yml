name: acceptance-local-k3s

on:
  workflow_dispatch:
    inputs:
      deploy_repo:
        description: "owner/repo of deploy repository"
        required: false
        default: "BrunoGaoSZ/ljwx-deploy"
      deploy_values_file:
        description: "Path of service release values YAML inside deploy repo"
        required: false
        default: "apps/ljwx-platform/overlays/prod/kustomization.yaml"
      namespace:
        description: "Kubernetes namespace"
        required: false
        default: "ljwx-platform"
      deployment_name:
        description: "Kubernetes deployment name"
        required: false
        default: "ljwx-platform"
      argocd_namespace:
        description: "Argo CD namespace"
        required: false
        default: "argocd"
      argocd_application:
        description: "Argo CD Application name"
        required: false
        default: "ljwx-platform"
      verify_minutes:
        description: "Verification timeout minutes"
        required: false
        default: "10"
  workflow_run:
    workflows: ["Release To Deploy"]
    types: [completed]

permissions:
  contents: read

jobs:
  acceptance:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') }}
    runs-on: [self-hosted, k3s-local]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kubectl (no sudo)
        shell: bash
        run: |
          set -euo pipefail
          BIN_DIR="${RUNNER_TEMP}/bin"
          mkdir -p "${BIN_DIR}"
          KUBECTL_BIN="kubectl"
          if ! command -v kubectl >/dev/null 2>&1; then
            curl -sSL -o "${BIN_DIR}/kubectl" "https://dl.k8s.io/release/$(curl -sSL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
            chmod +x "${BIN_DIR}/kubectl"
            echo "${BIN_DIR}" >> "${GITHUB_PATH}"
            KUBECTL_BIN="${BIN_DIR}/kubectl"
          fi
          "${KUBECTL_BIN}" version --client

      - name: Configure kubeconfig
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ secrets.KUBE_CONFIG_B64 }}" ]; then
            KUBECONFIG_PATH="${RUNNER_TEMP}/kubeconfig"
            echo "${{ secrets.KUBE_CONFIG_B64 }}" | base64 -d > "${KUBECONFIG_PATH}"
            chmod 600 "${KUBECONFIG_PATH}"
            echo "KUBECONFIG=${KUBECONFIG_PATH}" >> "${GITHUB_ENV}"
            exit 0
          fi
          if [ -r "/etc/rancher/k3s/k3s.yaml" ]; then
            echo "KUBECONFIG=/etc/rancher/k3s/k3s.yaml" >> "${GITHUB_ENV}"
            exit 0
          fi
          echo "[FATAL] kubeconfig not found. Provide KUBE_CONFIG_B64 or make /etc/rancher/k3s/k3s.yaml readable."
          exit 1

      - name: Verify cluster access
        shell: bash
        run: |
          set -euo pipefail
          kubectl cluster-info
          kubectl get nodes -o wide

      - name: Resolve deploy metadata from ljwx-deploy
        id: release
        env:
          DEPLOY_REPO_TOKEN: ${{ secrets.DEPLOY_REPO_TOKEN }}
          DEPLOY_VALUES_FILE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_values_file || 'apps/ljwx-platform/overlays/prod/kustomization.yaml' }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${DEPLOY_REPO_TOKEN:-}" ]; then
            echo "[FATAL] DEPLOY_REPO_TOKEN is required"
            exit 1
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            DEPLOY_REPO="${{ github.event.inputs.deploy_repo }}"
            DEPLOY_VALUES_FILE="${{ github.event.inputs.deploy_values_file }}"
          else
            DEPLOY_REPO="BrunoGaoSZ/ljwx-deploy"
            DEPLOY_VALUES_FILE="apps/ljwx-platform/overlays/prod/kustomization.yaml"
          fi

          git clone --depth=1 "https://x-access-token:${DEPLOY_REPO_TOKEN}@github.com/${DEPLOY_REPO}.git" deploy-repo

          VALUES_FILE="deploy-repo/${DEPLOY_VALUES_FILE}"
          if [ ! -f "${VALUES_FILE}" ]; then
            echo "[FATAL] deploy values file not found: ${VALUES_FILE}"
            exit 1
          fi

          IMAGE="$(sed -n 's/^image:[[:space:]]*//p' "${VALUES_FILE}" | head -n1 | tr -d '"' | xargs || true)"
          DEPLOYMENT_ID="$(sed -n 's/^deploymentId:[[:space:]]*//p' "${VALUES_FILE}" | head -n1 | tr -d '"' | xargs || true)"
          SERVICE_VERSION="$(sed -n 's/^serviceVersion:[[:space:]]*//p' "${VALUES_FILE}" | head -n1 | tr -d '"' | xargs || true)"
          IMAGE_DIGEST="$(sed -n 's/^imageDigest:[[:space:]]*//p' "${VALUES_FILE}" | head -n1 | tr -d '"' | xargs || true)"

          # Compatibility for kustomization overlays using images.newName/newTag or images.newName+digest.
          if [ -z "${IMAGE}" ]; then
            NEW_NAME="$(sed -n 's/^[[:space:]]*newName:[[:space:]]*//p' "${VALUES_FILE}" | head -n1 | tr -d '"' | xargs || true)"
            NEW_TAG="$(sed -n 's/^[[:space:]]*newTag:[[:space:]]*//p' "${VALUES_FILE}" | head -n1 | tr -d '"' | xargs || true)"
            NEW_DIGEST="$(sed -n 's/^[[:space:]]*digest:[[:space:]]*//p' "${VALUES_FILE}" | head -n1 | tr -d '"' | xargs || true)"
            if [ -n "${NEW_NAME}" ] && [ -n "${NEW_TAG}" ]; then
              IMAGE="${NEW_NAME}:${NEW_TAG}"
              [ -z "${DEPLOYMENT_ID}" ] && DEPLOYMENT_ID="${NEW_TAG}"
              [ -z "${SERVICE_VERSION}" ] && SERVICE_VERSION="${NEW_TAG}"
              [ -z "${IMAGE_DIGEST}" ] && IMAGE_DIGEST="unknown"
            elif [ -n "${NEW_NAME}" ] && [ -n "${NEW_DIGEST}" ]; then
              IMAGE="${NEW_NAME}@${NEW_DIGEST}"
              SHORT_DIGEST="${NEW_DIGEST#sha256:}"
              SHORT_DIGEST="${SHORT_DIGEST:0:12}"
              [ -z "${DEPLOYMENT_ID}" ] && DEPLOYMENT_ID="digest-${SHORT_DIGEST}"
              [ -z "${SERVICE_VERSION}" ] && SERVICE_VERSION="digest-${SHORT_DIGEST}"
              [ -z "${IMAGE_DIGEST}" ] && IMAGE_DIGEST="${NEW_DIGEST}"
            fi
          fi

          if [ -z "${IMAGE}" ]; then
            echo "[FATAL] image/newName+newTag/newName+digest not found in ${VALUES_FILE}"
            exit 1
          fi

          {
            echo "image=${IMAGE}"
            echo "deployment_id=${DEPLOYMENT_ID}"
            echo "service_version=${SERVICE_VERSION}"
            echo "image_digest=${IMAGE_DIGEST}"
          } >> "${GITHUB_OUTPUT}"

      - name: Resolve verify settings
        id: cfg
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            NAMESPACE="${{ github.event.inputs.namespace }}"
            DEPLOYMENT_NAME="${{ github.event.inputs.deployment_name }}"
            ARGOCD_NAMESPACE="${{ github.event.inputs.argocd_namespace }}"
            ARGOCD_APP="${{ github.event.inputs.argocd_application }}"
            VERIFY_MINUTES="${{ github.event.inputs.verify_minutes }}"
          else
            NAMESPACE="ljwx-platform"
            DEPLOYMENT_NAME="ljwx-platform"
            ARGOCD_NAMESPACE="argocd"
            ARGOCD_APP="ljwx-platform"
            VERIFY_MINUTES="10"
          fi
          echo "namespace=${NAMESPACE}" >> "${GITHUB_OUTPUT}"
          echo "deployment_name=${DEPLOYMENT_NAME}" >> "${GITHUB_OUTPUT}"
          echo "argocd_namespace=${ARGOCD_NAMESPACE}" >> "${GITHUB_OUTPUT}"
          echo "argocd_app=${ARGOCD_APP}" >> "${GITHUB_OUTPUT}"
          echo "verify_minutes=${VERIFY_MINUTES}" >> "${GITHUB_OUTPUT}"

      - name: Wait for Argo app synced/healthy
        shell: bash
        run: |
          set -euo pipefail
          ARGOCD_NAMESPACE="${{ steps.cfg.outputs.argocd_namespace }}"
          ARGOCD_APP="${{ steps.cfg.outputs.argocd_app }}"
          WAIT_SECONDS="$(( ${{ steps.cfg.outputs.verify_minutes }} * 60 ))"
          START_TS="$(date +%s)"

          while true; do
            SYNC_STATUS="$(kubectl -n "${ARGOCD_NAMESPACE}" get applications.argoproj.io "${ARGOCD_APP}" -o jsonpath='{.status.sync.status}' 2>/dev/null || true)"
            HEALTH_STATUS="$(kubectl -n "${ARGOCD_NAMESPACE}" get applications.argoproj.io "${ARGOCD_APP}" -o jsonpath='{.status.health.status}' 2>/dev/null || true)"
            if [ "${SYNC_STATUS}" = "Synced" ] && [ "${HEALTH_STATUS}" = "Healthy" ]; then
              echo "[INFO] Argo app ${ARGOCD_APP} is Synced/Healthy"
              break
            fi
            NOW_TS="$(date +%s)"
            if [ $((NOW_TS - START_TS)) -ge "${WAIT_SECONDS}" ]; then
              echo "[FATAL] timeout waiting Argo app ${ARGOCD_APP}, last status sync=${SYNC_STATUS:-N/A} health=${HEALTH_STATUS:-N/A}"
              exit 1
            fi
            sleep 10
          done

      - name: Dump pod diagnostics on failure
        if: failure()
        shell: bash
        run: |
          NAMESPACE="${{ steps.cfg.outputs.namespace }}"
          ARGOCD_NAMESPACE="${{ steps.cfg.outputs.argocd_namespace }}"
          ARGOCD_APP="${{ steps.cfg.outputs.argocd_app }}"
          echo "========== ArgoCD Application Status =========="
          kubectl -n "${ARGOCD_NAMESPACE}" get application "${ARGOCD_APP}" \
            -o jsonpath='{.status}' 2>/dev/null | python3 -m json.tool || true
          echo "========== Pods =========="
          kubectl -n "${NAMESPACE}" get pods -o wide || true
          echo "========== Events (last 30) =========="
          kubectl -n "${NAMESPACE}" get events \
            --sort-by='.lastTimestamp' 2>/dev/null | tail -30 || true
          echo "========== Pod Descriptions =========="
          kubectl -n "${NAMESPACE}" describe pods 2>/dev/null | \
            grep -A 20 -E '^(Name:|Conditions:|Events:)' || true
          echo "========== Container Logs (last 200 lines each) =========="
          for POD in $(kubectl -n "${NAMESPACE}" get pods \
            -o jsonpath='{.items[*].metadata.name}' 2>/dev/null); do
            echo "--- Pod: ${POD} ---"
            kubectl -n "${NAMESPACE}" logs "${POD}" \
              --all-containers=true --tail=200 2>/dev/null || true
            echo "--- Previous logs for: ${POD} ---"
            kubectl -n "${NAMESPACE}" logs "${POD}" \
              --all-containers=true --previous --tail=50 2>/dev/null || true
          done

      - name: Verify rollout and deployment metadata
        shell: bash
        run: |
          set -euo pipefail
          NAMESPACE="${{ steps.cfg.outputs.namespace }}"
          DEPLOYMENT_NAME="${{ steps.cfg.outputs.deployment_name }}"
          WAIT_MINUTES="${{ steps.cfg.outputs.verify_minutes }}"
          kubectl -n "${NAMESPACE}" rollout status deployment/"${DEPLOYMENT_NAME}" --timeout="${WAIT_MINUTES}m"

          ACTUAL_DEPLOYMENT_ID="$(
            kubectl -n "${NAMESPACE}" get deployment "${DEPLOYMENT_NAME}" \
              -o jsonpath='{.spec.template.spec.containers[0].env[?(@.name=="DEPLOYMENT_ID")].value}'
          )"
          EXPECTED_DEPLOYMENT_ID="${{ steps.release.outputs.deployment_id }}"
          if [ -n "${EXPECTED_DEPLOYMENT_ID}" ] && [ -n "${ACTUAL_DEPLOYMENT_ID}" ] && [ "${ACTUAL_DEPLOYMENT_ID}" != "${EXPECTED_DEPLOYMENT_ID}" ]; then
            echo "[FATAL] DEPLOYMENT_ID mismatch, expected=${EXPECTED_DEPLOYMENT_ID}, actual=${ACTUAL_DEPLOYMENT_ID}"
            exit 1
          fi
          if [ -z "${EXPECTED_DEPLOYMENT_ID}" ] || [ -z "${ACTUAL_DEPLOYMENT_ID}" ]; then
            echo "[WARN] Skip DEPLOYMENT_ID strict check: expected='${EXPECTED_DEPLOYMENT_ID}' actual='${ACTUAL_DEPLOYMENT_ID}'"
          fi

      - name: Verify Prometheus target otel-agent-metrics
        shell: bash
        run: |
          set -euo pipefail
          PROM_NS="monitoring"
          PROM_SVC="$(
            kubectl -n "${PROM_NS}" get svc \
              -o jsonpath='{range .items[*]}{.metadata.name}{" "}{range .spec.ports[*]}{.port}{","}{end}{"\n"}{end}' \
              | awk '$1 ~ /^prometheus/ && $2 ~ /(^|,)9090,/{print $1; exit}'
          )"
          if [ -z "${PROM_SVC}" ]; then
            echo "[FATAL] Prometheus service not found in namespace ${PROM_NS}"
            exit 1
          fi
          kubectl -n "${PROM_NS}" port-forward "svc/${PROM_SVC}" 19090:9090 >/tmp/prom-port-forward.log 2>&1 &
          PF_PID=$!
          trap 'kill ${PF_PID} >/dev/null 2>&1 || true' EXIT
          sleep 5
          curl -fsS "http://127.0.0.1:19090/api/v1/targets?state=active" >/tmp/prom-targets.json
          python3 - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path("/tmp/prom-targets.json").read_text(encoding="utf-8"))
          active = payload.get("data", {}).get("activeTargets", [])
          hit = any(
              str(t.get("labels", {}).get("job", "")).strip() == "otel-agent-metrics"
              and str(t.get("health", "")).lower() == "up"
              for t in active
          )
          if not hit:
              raise SystemExit("[FATAL] Prometheus target otel-agent-metrics is not UP")
          print("[INFO] Prometheus target otel-agent-metrics is UP")
          PY

      - name: Summary
        shell: bash
        run: |
          {
            echo "## Local K3s Verification Result"
            echo "- image: \`${{ steps.release.outputs.image }}\`"
            echo "- deploymentId: \`${{ steps.release.outputs.deployment_id }}\`"
            echo "- serviceVersion: \`${{ steps.release.outputs.service_version }}\`"
            echo "- imageDigest: \`${{ steps.release.outputs.image_digest }}\`"
          } >> "${GITHUB_STEP_SUMMARY}"
