version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "02:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - automerge:candidate
    commit-message:
      prefix: "chore(deps-actions)"
    groups:
      security-patches:
        applies-to: security-updates
        patterns:
          - "*"
      patch-updates:
        applies-to: version-updates
        update-types:
          - patch
        patterns:
          - "*"

  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "02:30"
      timezone: "UTC"
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - automerge:candidate
    commit-message:
      prefix: "chore(deps-java)"
    groups:
      security-patches:
        applies-to: security-updates
        patterns:
          - "*"
      patch-updates:
        applies-to: version-updates
        update-types:
          - patch
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - automerge:candidate
    commit-message:
      prefix: "chore(deps-fe)"
    groups:
      security-patches:
        applies-to: security-updates
        patterns:
          - "*"
      patch-updates:
        applies-to: version-updates
        update-types:
          - patch
        patterns:
          - "*"
