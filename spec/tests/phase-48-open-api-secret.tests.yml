# Phase 48 — Open API Secret 测试契约
# 关联 Spec：spec/phase/phase-48.md

phase: 48
module: "open-api-secret"
ac_ref: "spec/phase/phase-48.md"

tests:

  # ─── P0：安全测试 ───────────────────────────────────────────────
  - id: TC-48-01
    priority: P0
    category: security
    scenario: "无 App ID 和 Secret 访问 API → 401"
    request:
      method: GET
      path: /open-api/v1/users
      auth: none
    expect:
      status: 401

  - id: TC-48-02
    priority: P0
    category: security
    scenario: "错误的 App Secret → 401"
    request:
      method: GET
      path: /open-api/v1/users
      headers:
        X-App-Id: "{appId}"
        X-App-Secret: "wrong-secret"
    expect:
      status: 401
      body:
        code: 401002
        message: "App Secret 无效"

  # ─── P0：密钥认证 ──────────────────────────────────────────────
  - id: TC-48-03
    priority: P0
    category: authentication
    ac: AC-01
    scenario: "使用 App ID 和 Secret 认证成功"
    setup:
      - create_app_with_credentials
    request:
      method: GET
      path: /open-api/v1/users
      headers:
        X-App-Id: "{appId}"
        X-App-Secret: "{appSecret}"
    expect:
      status: 200

  - id: TC-48-04
    priority: P0
    category: authentication
    ac: AC-02
    scenario: "签名认证成功"
    setup:
      - create_app_with_credentials
    request:
      method: GET
      path: /open-api/v1/users
      headers:
        X-App-Id: "{appId}"
        X-Timestamp: "{timestamp}"
        X-Signature: "{计算的签名}"
    expect:
      status: 200

  - id: TC-48-05
    priority: P0
    category: authentication
    ac: AC-02
    scenario: "签名错误 → 401"
    request:
      method: GET
      path: /open-api/v1/users
      headers:
        X-App-Id: "{appId}"
        X-Timestamp: "{timestamp}"
        X-Signature: "wrong-signature"
    expect:
      status: 401
      body:
        code: 401003
        message: "签名验证失败"

  - id: TC-48-06
    priority: P0
    category: authentication
    ac: AC-03
    scenario: "时间戳过期 → 401"
    request:
      method: GET
      path: /open-api/v1/users
      headers:
        X-App-Id: "{appId}"
        X-Timestamp: "{过期的时间戳}"
        X-Signature: "{签名}"
    expect:
      status: 401
      body:
        code: 401004
        message: "请求已过期"

  # ─── P0：密钥管理 ──────────────────────────────────────────────
  - id: TC-48-07
    priority: P0
    category: secret
    ac: AC-04
    scenario: "查询密钥列表（脱敏）"
    setup:
      - create_app_with_secret
    request:
      method: GET
      path: /api/v1/open-api/apps/{appId}/secrets
      auth: token_with_system:openapi:list
    expect:
      status: 200
      body:
        data:
          list:
            - appSecret: "abc***xyz"

  - id: TC-48-08
    priority: P0
    category: secret
    ac: AC-05
    scenario: "创建新密钥"
    setup:
      - create_app
    request:
      method: POST
      path: /api/v1/open-api/apps/{appId}/secrets
      auth: token_with_system:openApi:secret:add
      body:
        description: "新密钥"
    expect:
      status: 200
      body:
        data:
          appSecret: "{新密钥明文}"

  - id: TC-48-09
    priority: P0
    category: secret
    ac: AC-06
    scenario: "禁用密钥"
    setup:
      - create_app_with_secret
    request:
      method: PUT
      path: /api/v1/open-api/apps/{appId}/secrets/{secretId}/disable
      auth: token_with_system:openApi:secret:edit
    expect:
      status: 200
      db_assert: "SELECT status FROM open_api_secret WHERE id={secretId} → DISABLED"

  - id: TC-48-10
    priority: P0
    category: secret
    ac: AC-07
    scenario: "使用已禁用的密钥 → 401"
    setup:
      - create_app_with_disabled_secret
    request:
      method: GET
      path: /open-api/v1/users
      headers:
        X-App-Id: "{appId}"
        X-App-Secret: "{disabledSecret}"
    expect:
      status: 401
      body:
        code: 401005
        message: "密钥已禁用"

  # ─── P0：租户隔离 ───────────────────────────────────────────────
  - id: TC-48-11
    priority: P0
    category: tenant_isolation
    scenario: "租户 A 的密钥无法访问租户 B 的数据"
    setup:
      - create_app_for_tenant_A
      - create_data_for_tenant_B
    request:
      method: GET
      path: /open-api/v1/users
      headers:
        X-App-Id: "{tenantAAppId}"
        X-App-Secret: "{tenantASecret}"
    expect:
      status: 200
      body:
        data:
          list: "[仅包含租户 A 的数据]"

  # ─── P1：数据库结构验证 ─────────────────────────────────────────
  - id: TC-48-12
    priority: P1
    category: db_schema
    ac: AC-08
    scenario: "open_api_secret 表包含 7 列审计字段"
    expect:
      db_assert: "open_api_secret 表包含 tenant_id, created_by, created_time, updated_by, updated_time, deleted, version"

  - id: TC-48-13
    priority: P1
    category: db_schema
    ac: AC-08
    scenario: "app_secret 加密存储"
    expect:
      db_assert: "open_api_secret 表 app_secret 列存储加密值"

# ─── AC → TC 映射 ──────────────────────────────────────────────────
ac_tc_map:
  AC-01: [TC-48-03]
  AC-02: [TC-48-04, TC-48-05]
  AC-03: [TC-48-06]
  AC-04: [TC-48-07]
  AC-05: [TC-48-08]
  AC-06: [TC-48-09]
  AC-07: [TC-48-10]
  AC-08: [TC-48-12, TC-48-13]
  AC-09: []  # 编译检查由 Gate R01 覆盖

# ─── Gate R09 配置 ─────────────────────────────────────────────────
gate_r09:
  p0_required: true
  p1_coverage_target: 0.7
  p2_skip: true
  test_class: "OpenApiSecretControllerTest"
  note: "本 Phase 包含密钥认证、签名验证、密钥管理、租户隔离测试"
