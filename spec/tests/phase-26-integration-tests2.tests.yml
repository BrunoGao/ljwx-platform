  # ─── LoginLogControllerIT ───────────────────────────────────────
  - id: TC-26-17
    priority: P0
    category: security
    scenario: "GET /api/v1/login-logs — 未认证返回 401"
    test_class: "LoginLogControllerIT"
    expect:
      status: 401

  - id: TC-26-18
    priority: P0
    category: business
    scenario: "登录后自动写入登录日志，日志列表非空"
    test_class: "LoginLogControllerIT"
    expect:
      status: 200
      assert: "response.data.list.size > 0"

  - id: TC-26-19
    priority: P0
    category: security
    scenario: "GET /api/v1/login-logs — 无权限返回 403"
