# Phase 26 — Integration Tests Phase 2 测试契约
# 关联 Spec：spec/phase/phase-26.md
# 本 Phase 即为测试实现，以下为覆盖契约（非另立测试）

phase: 26
module: "integration-tests2"
ac_ref: "spec/phase/phase-26.md"

note: >
  Phase 26 本身即为集成测试实现（MenuControllerIT、DeptControllerIT 等）。
  以下契约描述各 IT 类必须覆盖的场景，验证方式：mvn test -f pom.xml 全部通过。

tests:

  # ─── MenuControllerIT ───────────────────────────────────────────
  - id: TC-26-01
    priority: P0
    category: security
    scenario: "GET /api/v1/menus — 未认证返回 401"
    test_class: "MenuControllerIT"
    expect:
      status: 401

  - id: TC-26-02
    priority: P0
    category: security
    scenario: "GET /api/v1/menus — 无权限返回 403"
    test_class: "MenuControllerIT"
    expect:
      status: 403

  - id: TC-26-03
    priority: P0
    category: crud
    scenario: "POST /api/v1/menus — 创建成功"
    test_class: "MenuControllerIT"
    expect:
      status: 200
      body:
        data: "${type: Long}"

  - id: TC-26-04
    priority: P0
    category: crud
    scenario: "GET /api/v1/menus/tree — 返回树形结构"
    test_class: "MenuControllerIT"
    expect:
      status: 200

  - id: TC-26-05
    priority: P0
    category: crud
    scenario: "PUT /api/v1/menus/{id} — 更新成功"
    test_class: "MenuControllerIT"
    expect:
      status: 200

  - id: TC-26-06
    priority: P0
    category: crud
    scenario: "DELETE /api/v1/menus/{id} — 软删除成功"
    test_class: "MenuControllerIT"
    expect:
      status: 200

  # ─── DeptControllerIT ───────────────────────────────────────────
  - id: TC-26-07
    priority: P0
    category: security
    scenario: "GET /api/v1/depts — 未认证返回 401"
    test_class: "DeptControllerIT"
    expect:
      status: 401

  - id: TC-26-08
    priority: P0
    category: crud
    scenario: "POST /api/v1/depts — 创建成功"
    test_class: "DeptControllerIT"
    expect:
      status: 200

  - id: TC-26-09
    priority: P0
    category: crud
    scenario: "GET /api/v1/depts/tree — 返回树形结构"
    test_class: "DeptControllerIT"
    expect:
      status: 200

  - id: TC-26-10
    priority: P0
    category: validation
    scenario: "POST /api/v1/depts — 缺少必填字段返回 400"
    test_class: "DeptControllerIT"
    expect:
      status: 400

  - id: TC-26-11
    priority: P0
    category: crud
    scenario: "PUT /api/v1/depts/{id} — 更新成功"
    test_class: "DeptControllerIT"
    expect:
      status: 200

  - id: TC-26-12
    priority: P0
    category: crud
    scenario: "DELETE /api/v1/depts/{id} — 删除成功"
    test_class: "DeptControllerIT"
    expect:
      status: 200

  # ─── ProfileControllerIT ────────────────────────────────────────
  - id: TC-26-13
    priority: P0
    category: security
    scenario: "GET /api/v1/profile — 未认证返回 401"
    test_class: "ProfileControllerIT"
    expect:
      status: 401

  - id: TC-26-14
    priority: P0
    category: crud
    scenario: "GET /api/v1/profile — 已认证返回个人信息"
    test_class: "ProfileControllerIT"
    expect:
      status: 200

  - id: TC-26-15
    priority: P0
    category: crud
    scenario: "PUT /api/v1/profile — 更新成功"
    test_class: "ProfileControllerIT"
    expect:
