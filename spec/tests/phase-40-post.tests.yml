# Phase 40 — 岗位管理 测试契约
# 关联 Spec：spec/phase/phase-40.md

phase: 40
module: "post-management"
ac_ref: "spec/phase/phase-40.md"

tests:

  # ─── P0：安全测试 ───────────────────────────────────────────────
  - id: TC-40-01
    priority: P0
    category: security
    scenario: "无 Token 访问岗位列表 → 401"
    request:
      method: GET
      path: /api/v1/posts
      auth: none
    expect:
      status: 401

  - id: TC-40-02
    priority: P0
    category: security
    scenario: "无权限 Token 创建岗位 → 403"
    request:
      method: POST
      path: /api/v1/posts
      auth: token_without_permission
    expect:
      status: 403

  # ─── P0：岗位 CRUD ─────────────────────────────────────────────
  - id: TC-40-03
    priority: P0
    category: crud
    ac: AC-01
    scenario: "创建岗位"
    request:
      method: POST
      path: /api/v1/posts
      auth: token_with_system:post:add
      body:
        postCode: "ENGINEER"
        postName: "工程师"
        postSort: 1
        status: "ENABLED"
        remark: "软件工程师"
    expect:
      status: 200
      body:
        code: 200
        data: "{postId}"

  - id: TC-40-04
    priority: P0
    category: crud
    ac: AC-01
    scenario: "查询岗位列表"
    request:
      method: GET
      path: /api/v1/posts
      auth: token_with_system:post:list
    expect:
      status: 200
      body:
        code: 200
        data:
          list: "[岗位列表]"

  - id: TC-40-05
    priority: P0
    category: crud
    ac: AC-01
    scenario: "查询岗位详情"
    request:
      method: GET
      path: /api/v1/posts/{postId}
      auth: token_with_system:post:query
    expect:
      status: 200
      body:
        code: 200
        data:
          postCode: "ENGINEER"
          postName: "工程师"

  - id: TC-40-06
    priority: P0
    category: crud
    ac: AC-01
    scenario: "更新岗位信息"
    request:
      method: PUT
      path: /api/v1/posts/{postId}
      auth: token_with_system:post:edit
      body:
        postName: "高级工程师"
        postSort: 2
    expect:
      status: 200
      body:
        code: 200

  - id: TC-40-07
    priority: P0
    category: crud
    ac: AC-05
    scenario: "删除岗位（软删除）"
    request:
      method: DELETE
      path: /api/v1/posts/{postId}
      auth: token_with_system:post:delete
    expect:
      status: 200
      body:
        code: 200
      db_assert: "SELECT deleted FROM sys_post WHERE id={postId} → TRUE"

  # ─── P0：业务规则 ──────────────────────────────────────────────
  - id: TC-40-08
    priority: P0
    category: validation
    ac: AC-06
    scenario: "postCode 唯一性校验：同租户内重复编码 → 400"
    setup:
      - create_post_with_code_ENGINEER
    request:
      method: POST
      path: /api/v1/posts
      auth: token_with_system:post:add
      body:
        postCode: "ENGINEER"
        postName: "工程师2"
        postSort: 3
        status: "ENABLED"
    expect:
      status: 400
      body:
        code: 400002
        message: "岗位编码已存在"

  - id: TC-40-09
    priority: P0
    category: business
    ac: AC-07
    scenario: "删除有关联用户的岗位 → 400"
    setup:
      - create_post_with_users
    request:
      method: DELETE
      path: /api/v1/posts/{postId}
      auth: token_with_system:post:delete
    expect:
      status: 400
      body:
        code: 400003
        message: "岗位下存在关联用户，无法删除"

  # ─── P0：租户隔离 ───────────────────────────────────────────────
  - id: TC-40-10
    priority: P0
    category: tenant_isolation
    ac: AC-04
    scenario: "租户 A 查不到租户 B 的岗位"
    setup:
      - create_post_for_tenant_A
      - create_post_for_tenant_B
    request:
      method: GET
      path: /api/v1/posts
      auth: token_tenant_A
    expect:
      status: 200
      body:
        data:
          list: "[仅包含租户 A 的岗位]"

  # ─── P0：VO 字段验证 ─────────────────────────────────────────
  - id: TC-40-11
    priority: P0
    category: response
    ac: AC-03
    scenario: "PostVO 不包含 tenantId、deleted、createdBy、updatedBy、version"
    request:
      method: GET
      path: /api/v1/posts/{postId}
      auth: token_with_system:post:query
    expect:
      status: 200
      body:
        data:
          id: "{postId}"
          postCode: "ENGINEER"
          postName: "工程师"
          postSort: 1
          status: "ENABLED"
          createdTime: "{not null}"
          updatedTime: "{not null}"
      note: "响应中不应包含 tenantId、deleted、createdBy、updatedBy、version 字段"

  # ─── P1：数据库结构验证 ─────────────────────────────────────────
  - id: TC-40-12
    priority: P1
    category: db_schema
    ac: AC-01
    scenario: "sys_post 表包含 7 列审计字段，无 IF NOT EXISTS"
    expect:
      db_assert: "sys_post 表包含 tenant_id, created_by, created_time, updated_by, updated_time, deleted, version"

  - id: TC-40-13
    priority: P1
    category: db_schema
    ac: AC-01
    scenario: "sys_user_post 表包含 7 列审计字段"
    expect:
      db_assert: "sys_user_post 表包含 tenant_id, created_by, created_time, updated_by, updated_time, deleted, version"

  - id: TC-40-14
    priority: P1
    category: db_schema
    ac: AC-06
    scenario: "uk_tenant_post_code 唯一索引存在"
    expect:
      db_assert: "sys_post 表有 uk_tenant_post_code (tenant_id, post_code, deleted) UNIQUE 索引"

# ─── AC → TC 映射 ──────────────────────────────────────────────────
ac_tc_map:
  AC-01: [TC-40-03, TC-40-04, TC-40-05, TC-40-06, TC-40-07, TC-40-12, TC-40-13]
  AC-02: [TC-40-02]
  AC-03: [TC-40-11]
  AC-04: [TC-40-10]
  AC-05: [TC-40-07]
  AC-06: [TC-40-08, TC-40-14]
  AC-07: [TC-40-09]
  AC-08: []  # 编译+前端类型检查由 Gate R01/R02 覆盖

# ─── Gate R09 配置 ─────────────────────────────────────────────────
gate_r09:
  p0_required: true
  p1_coverage_target: 0.7
  p2_skip: true
  test_class: "PostControllerTest"
  note: "本 Phase 包含岗位 CRUD、postCode 唯一性校验、关联用户删除拦截、租户隔离测试"
