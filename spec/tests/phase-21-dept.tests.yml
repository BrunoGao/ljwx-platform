# Phase 21 — Dept 测试契约
# 关联 Spec：spec/phase/phase-21.md
# 测试类：DeptControllerTest.java

phase: 21
module: "dept"
ac_ref: "spec/phase/phase-21.md"

tests:

  # ─── P0：安全测试 ───────────────────────────────────────────────
  - id: TC-21-01
    priority: P0
    category: security
    ac: AC-02
    scenario: "无 Token 访问列表"
    request:
      method: GET
      path: /api/v1/depts
      auth: none
    expect:
      status: 401

  - id: TC-21-02
    priority: P0
    category: security
    ac: AC-02
    scenario: "无权限访问列表（缺 system:dept:list）"
    request:
      method: GET
      path: /api/v1/depts
      auth: valid_token
      missing_perm: "system:dept:list"
    expect:
      status: 403

  - id: TC-21-03
    priority: P0
    category: security
    ac: AC-02
    scenario: "无权限创建（缺 system:dept:create）"
    request:
      method: POST
      path: /api/v1/depts
      auth: valid_token
      missing_perm: "system:dept:create"
    expect:
      status: 403

  - id: TC-21-04
    priority: P0
    category: security
    ac: AC-02
    scenario: "无权限更新（缺 system:dept:update）"
    request:
      method: PUT
      path: /api/v1/depts/1
      auth: valid_token
      missing_perm: "system:dept:update"
    expect:
      status: 403

  - id: TC-21-05
    priority: P0
    category: security
    ac: AC-02
    scenario: "无权限删除（缺 system:dept:delete）"
    request:
      method: DELETE
      path: /api/v1/depts/1
      auth: valid_token
      missing_perm: "system:dept:delete"
    expect:
      status: 403

  # ─── P0：CRUD 核心流程 ──────────────────────────────────────────
  - id: TC-21-06
    priority: P0
    category: crud
    ac: AC-03
    scenario: "正常创建部门"
    request:
      method: POST
      path: /api/v1/depts
      auth: full_perm_token
      body:
        parentId: 0
        name: "技术部"
        sort: 1
        leader: "张三"
        phone: "13800138000"
        email: "tech@example.com"
        status: 1
    expect:
      status: 200
      body:
        data: "${type: Long}"

  - id: TC-21-07
    priority: P0
    category: crud
    ac: AC-03
    scenario: "正常查询平铺列表"
    request:
      method: GET
      path: /api/v1/depts
      auth: full_perm_token
    expect:
      status: 200
      body:
        data: "${type: List}"

  - id: TC-21-08
    priority: P0
    category: crud
    ac: AC-03
    bl_ref: BL-21-05
    scenario: "正常查询部门树，根节点 parentId=0 在首层"
    request:
      method: GET
      path: /api/v1/depts/tree
      auth: full_perm_token
    expect:
      status: 200
      assert: "response.data 为数组，首层元素 parentId=0，子节点在 children 字段"

  - id: TC-21-09
    priority: P0
    category: crud
    ac: AC-03
    scenario: "正常查询部门详情"
    request:
      method: GET
      path: /api/v1/depts/{id}
      auth: full_perm_token
    expect:
      status: 200
      body:
        data.id: "${not_null}"
        data.name: "${not_null}"

  - id: TC-21-10
    priority: P0
    category: crud
    ac: AC-03
    scenario: "正常更新部门"
    request:
      method: PUT
      path: /api/v1/depts/{id}
      auth: full_perm_token
      body:
        name: "技术部(改)"
    expect:
      status: 200

  - id: TC-21-11
    priority: P0
    category: crud
    ac: AC-05
    scenario: "正常删除叶子部门，删除后列表不可见"
    setup:
      create_leaf_dept: true
    request:
      method: DELETE
      path: /api/v1/depts/{leaf_id}
      auth: full_perm_token
    expect:
      status: 200
      assert: "再次 GET /api/v1/depts，已删除部门不在列表中"

  # ─── P0：业务规则 ───────────────────────────────────────────────
  - id: TC-21-12
    priority: P0
    category: business
    ac: AC-05
    bl_ref: BL-21-03
    scenario: "软删除验证 — 数据库 deleted=TRUE"
    setup:
      create_record: true
      delete_via_api: true
    expect:
      db_assert: "SELECT deleted FROM sys_dept WHERE id=? → TRUE"

  - id: TC-21-13
    priority: P0
    category: business
    ac: AC-04
    bl_ref: BL-21-04
    scenario: "租户隔离 — 租户 A 查询不返回租户 B 数据"
    setup:
      tenant_a_dept: true
      tenant_b_dept: true
    request:
      method: GET
      path: /api/v1/depts
      auth: tenant_a_token
    expect:
      status: 200
      assert: "response.data 中无 tenant_b 的部门数据"

  - id: TC-21-14
    priority: P0
    category: business
    ac: AC-04
    bl_ref: BL-21-04
    scenario: "租户隔离 — 租户 B 查询不返回租户 A 数据"
    setup:
      tenant_a_dept: true
      tenant_b_dept: true
    request:
      method: GET
      path: /api/v1/depts
      auth: tenant_b_token
    expect:
      status: 200
      assert: "response.data 中无 tenant_a 的部门数据"

  - id: TC-21-15
    priority: P0
    category: business
    ac: AC-03
    bl_ref: BL-21-02
    scenario: "删除含子部门的父部门 → 业务异常 400"
    setup:
      create_parent_with_child: true
    request:
      method: DELETE
      path: /api/v1/depts/{parent_id}
      auth: full_perm_token
    expect:
      status: 400
      error_code: "DEPT_HAS_CHILDREN"

  - id: TC-21-16
    priority: P0
    category: business
    ac: AC-03
    bl_ref: BL-21-01
    scenario: "创建时 parentId 不存在 → 业务异常"
    request:
      method: POST
      path: /api/v1/depts
      auth: full_perm_token
      body:
        parentId: 99999999999
        name: "测试部门"
    expect:
      status: 400
      error_code: "PARENT_DEPT_NOT_FOUND"

  # ─── P1：参数校验 ───────────────────────────────────────────────
  - id: TC-21-17
    priority: P1
    category: validation
    scenario: "parentId 为 null → 400"
    request:
      method: POST
      path: /api/v1/depts
      auth: full_perm_token
      body:
        parentId: null
        name: "测试"
    expect:
      status: 400

  - id: TC-21-18
    priority: P1
    category: validation
    scenario: "name 为 null → 400"
    request:
      method: POST
      path: /api/v1/depts
      auth: full_perm_token
      body:
        parentId: 0
        name: null
    expect:
      status: 400

  - id: TC-21-19
    priority: P1
    category: validation
    scenario: "name 为空字符串 → 400"
    request:
      method: POST
      path: /api/v1/depts
      auth: full_perm_token
      body:
        parentId: 0
        name: ""
    expect:
      status: 400

  - id: TC-21-20
    priority: P1
    category: crud
    scenario: "查询不存在的部门 → 404/业务异常"
    request:
      method: GET
      path: /api/v1/depts/99999999999
      auth: full_perm_token
    expect:
      status: 404

  - id: TC-21-21
    priority: P1
    category: validation
    scenario: "email 格式错误 → 400"
    request:
      method: POST
      path: /api/v1/depts
      auth: full_perm_token
      body:
        parentId: 0
        name: "测试部门"
        email: "invalid-email"
    expect:
      status: 400

  # ─── P2：边界 ───────────────────────────────────────────────────
  - id: TC-21-22
    priority: P2
    category: validation
    scenario: "name 超长（65字符）→ 400"
    request:
      method: POST
      path: /api/v1/depts
      auth: full_perm_token
      body:
        parentId: 0
        name: "${length: 65}"
    expect:
      status: 400

  - id: TC-21-23
    priority: P2
    category: validation
    scenario: "phone 超长（21字符）→ 400"
    request:
      method: POST
      path: /api/v1/depts
      auth: full_perm_token
      body:
        parentId: 0
        name: "测试部门"
        phone: "${length: 21}"
    expect:
      status: 400

  - id: TC-21-24
    priority: P2
    category: crud
    scenario: "树形查询深度 3 层正常返回"
    setup:
      create_3_level_tree: true
    request:
      method: GET
      path: /api/v1/depts/tree
      auth: full_perm_token
    expect:
      status: 200
      assert: "response.data 包含 3 层嵌套结构"

# ─── AC → TC 映射 ──────────────────────────────────────────────────
ac_tc_map:
  AC-01: []  # Flyway 文件检查，由 gate 脚本验证
  AC-02: [TC-21-01, TC-21-02, TC-21-03, TC-21-04, TC-21-05]
  AC-03: [TC-21-06, TC-21-07, TC-21-09, TC-21-10, TC-21-15, TC-21-16]
  AC-04: [TC-21-13, TC-21-14]
  AC-05: [TC-21-11, TC-21-12]
  AC-06: []  # DAG 检查，由 gate 脚本验证
  AC-07: []  # 编译检查，由 gate 脚本验证

# ─── Gate R09 配置 ─────────────────────────────────────────────────
gate_r09:
  p0_required: true
  p1_coverage_target: 0.7
  p2_skip: true
  test_class: "DeptControllerTest"
