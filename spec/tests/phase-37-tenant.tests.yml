# Phase 37 — Grafana Dashboards & Alerting 测试契约
# 关联 Spec：spec/phase/phase-37.md
# Phase 37 为 K8s 配置 Phase（doc/config-only），无业务代码，无后端接口

phase: 37
module: "grafana-dashboards"
ac_ref: "spec/phase/phase-37.md"

note: >
  Phase 37 为 Grafana 仪表盘与告警配置 Phase（config-only），不生成任何业务代码。
  验证方式：检查 k8s/grafana-*.json 和 k8s/grafana-alerting-rules.yaml 文件存在且内容完整。

tests:

  # ─── P0：文件存在性验证 ──────────────────────────────────────────
  - id: TC-37-01
    priority: P0
    category: config
    ac: AC-01
    scenario: "grafana-dashboard-global.json 存在且包含全局总览面板"
    expect:
      note: "k8s/grafana-dashboard-global.json 文件存在，包含 QPS、错误率、P95 延迟、活跃租户数、在线用户数面板"

  - id: TC-37-02
    priority: P0
    category: config
    ac: AC-02
    scenario: "grafana-dashboard-jvm.json 存在且包含 JVM 监控面板"
    expect:
      note: "k8s/grafana-dashboard-jvm.json 文件存在，包含堆内存使用率、GC 暂停时间、线程数、CPU 使用率、类加载数面板"

  - id: TC-37-03
    priority: P0
    category: config
    ac: AC-03
    scenario: "grafana-dashboard-tenant.json 存在且包含租户视图面板"
    expect:
      note: "k8s/grafana-dashboard-tenant.json 文件存在，包含租户请求量 Top 10、租户错误率 Top 10 面板"

  - id: TC-37-04
    priority: P0
    category: config
    ac: AC-04
    scenario: "grafana-alerting-rules.yaml 存在且包含五条告警规则"
    expect:
      note: "k8s/grafana-alerting-rules.yaml 文件存在，包含 HighErrorRate、HighMemoryUsage、HighGCPause、HighP95Latency、ServiceDown 规则"

  # ─── P0：告警规则验证 ────────────────────────────────────────────
  - id: TC-37-05
    priority: P0
    category: alerting
    ac: AC-04
    scenario: "HighErrorRate 告警条件：错误率 > 5% 持续 5 分钟，级别 Critical"
    expect:
      note: "手工检查 grafana-alerting-rules.yaml 中 HighErrorRate 规则"

  - id: TC-37-06
    priority: P0
    category: alerting
    ac: AC-04
    scenario: "ServiceDown 告警条件：服务不可用 1 分钟，级别 Critical"
    expect:
      note: "手工检查 grafana-alerting-rules.yaml 中 ServiceDown 规则"

  # ─── P1：仪表盘刷新配置 ─────────────────────────────────────────
  - id: TC-37-07
    priority: P1
    category: config
    ac: AC-01
    scenario: "仪表盘自动刷新间隔为 30 秒"
    expect:
      note: "手工检查 grafana-dashboard-*.json 中 refresh 字段为 30s"

# ─── AC → TC 映射 ──────────────────────────────────────────────────
ac_tc_map:
  AC-01: [TC-37-01, TC-37-07]
  AC-02: [TC-37-02]
  AC-03: [TC-37-03]
  AC-04: [TC-37-04, TC-37-05, TC-37-06]
  AC-05: []  # 钉钉通知由运维配置，不在自动化测试范围内

# ─── Gate R09 配置 ─────────────────────────────────────────────────
gate_r09:
  p0_required: true
  p1_coverage_target: 0.7
  p2_skip: true
  test_class: "GrafanaDashboardConfigTest"
  note: "本 Phase 为配置 Phase，验证 Grafana 仪表盘和告警规则文件存在且内容完整"
