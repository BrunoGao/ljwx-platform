# Phase 42 — 超级管理员机制 测试契约
# 关联 Spec：spec/phase/phase-42.md
# Phase 42 无新增 HTTP 接口，验证 TenantLineHandler / SecurityUtils / TenantContextFilter 行为

phase: 42
module: "super-admin"
ac_ref: "spec/phase/phase-42.md"

note: >
  Phase 42 为机制 Phase（mechanism-only），不新增接口。
  超级管理员使用现有接口，但跳过租户过滤（tenant_id=0 绕过 TenantLineInterceptor）。
  超级管理员可通过 X-Tenant-Id header 切换租户上下文。

tests:

  # ─── P0：超管跳过租户过滤 ──────────────────────────────────────
  - id: TC-42-01
    priority: P0
    category: tenant_filter
    ac: AC-01
    scenario: "超级管理员（tenant_id=0）查询用户列表 → 返回所有租户的用户"
    setup:
      - create_user_for_tenant_A
      - create_user_for_tenant_B
    request:
      method: GET
      path: /api/v1/users
      auth: token_super_admin
    expect:
      status: 200
      body:
        data:
          note: "结果包含租户 A 和租户 B 的用户（不受 tenant_id 过滤限制）"

  - id: TC-42-02
    priority: P0
    category: tenant_filter
    ac: AC-02
    scenario: "超级管理员携带 X-Tenant-Id: 1 查询 → 仅返回 tenant_id=1 的用户"
    setup:
      - create_user_for_tenant_1
      - create_user_for_tenant_2
    request:
      method: GET
      path: /api/v1/users
      auth: token_super_admin
      headers:
        X-Tenant-Id: "1"
    expect:
      status: 200
      body:
        data:
          note: "结果仅包含 tenant_id=1 的用户"

  - id: TC-42-03
    priority: P0
    category: tenant_filter
    ac: AC-03
    scenario: "普通用户（tenant_id=1）携带 X-Tenant-Id: 2 → header 被忽略，仍返回 tenant_id=1 的用户"
    setup:
      - create_user_for_tenant_1
      - create_user_for_tenant_2
    request:
      method: GET
      path: /api/v1/users
      auth: token_tenant_1_user
      headers:
        X-Tenant-Id: "2"
    expect:
      status: 200
      body:
        data:
          note: "结果仅包含 tenant_id=1 的用户，X-Tenant-Id header 被忽略"

  # ─── P0：SecurityUtils.isSuperAdmin() ──────────────────────────
  - id: TC-42-04
    priority: P0
    category: security_utils
    ac: AC-04
    scenario: "SecurityUtils.isSuperAdmin() 对 tenant_id=0 用户返回 true"
    expect:
      note: "单元测试：构造 LoginUser(tenantId=0)，SecurityUtils.isSuperAdmin() 应返回 true"

  - id: TC-42-05
    priority: P0
    category: security_utils
    ac: AC-04
    scenario: "SecurityUtils.isSuperAdmin() 对 tenant_id=1 用户返回 false"
    expect:
      note: "单元测试：构造 LoginUser(tenantId=1)，SecurityUtils.isSuperAdmin() 应返回 false"

  - id: TC-42-06
    priority: P0
    category: security_utils
    ac: AC-04
    scenario: "SecurityUtils.isSuperAdmin() 对未认证用户返回 false"
    expect:
      note: "单元测试：SecurityContext 为空时，SecurityUtils.isSuperAdmin() 应返回 false"

  # ─── P0：TenantLineHandler 行为 ───────────────────────────────
  - id: TC-42-07
    priority: P0
    category: tenant_handler
    ac: AC-01
    scenario: "TenantLineHandler 对 tenant_id=0 返回 null，跳过 WHERE tenant_id=? 条件"
    expect:
      note: "单元测试：TenantContext.tenantId=0 时，TenantLineHandler.getTenantId() 返回 null"

  - id: TC-42-08
    priority: P0
    category: tenant_handler
    ac: AC-01
    scenario: "TenantLineHandler 对 tenant_id=1 返回 LongValue(1)，注入 WHERE tenant_id=1"
    expect:
      note: "单元测试：TenantContext.tenantId=1 时，TenantLineHandler.getTenantId() 返回 LongValue(1)"

  # ─── P0：超管创建数据时的 tenant_id ──────────────────────────
  - id: TC-42-09
    priority: P0
    category: tenant_filter
    ac: AC-05
    scenario: "超级管理员未携带 X-Tenant-Id，创建用户 → 用户 tenant_id=0"
    request:
      method: POST
      path: /api/v1/users
      auth: token_super_admin
      body:
        username: "newuser"
        password: "Test@12345"
    expect:
      status: 200
      db_assert: "SELECT tenant_id FROM sys_user WHERE username='newuser' → 0"

  - id: TC-42-10
    priority: P0
    category: tenant_filter
    ac: AC-05
    scenario: "超级管理员携带 X-Tenant-Id: 1，创建用户 → 用户 tenant_id=1"
    request:
      method: POST
      path: /api/v1/users
      auth: token_super_admin
      headers:
        X-Tenant-Id: "1"
      body:
        username: "tenantuser"
        password: "Test@12345"
    expect:
      status: 200
      db_assert: "SELECT tenant_id FROM sys_user WHERE username='tenantuser' → 1"

  # ─── P1：数据库初始数据验证 ─────────────────────────────────
  - id: TC-42-11
    priority: P1
    category: db_schema
    ac: AC-01
    scenario: "超级管理员用户 tenant_id=0"
    expect:
      db_assert: "SELECT tenant_id FROM sys_user WHERE username='superadmin' → 0"

  - id: TC-42-12
    priority: P1
    category: db_schema
    ac: AC-01
    scenario: "超级管理员角色 tenant_id=0，role_code='SUPER_ADMIN'"
    expect:
      db_assert: "SELECT tenant_id FROM sys_role WHERE role_code='SUPER_ADMIN' → 0"

# ─── AC → TC 映射 ──────────────────────────────────────────────────
ac_tc_map:
  AC-01: [TC-42-01, TC-42-07, TC-42-08, TC-42-11]
  AC-02: [TC-42-02]
  AC-03: [TC-42-03]
  AC-04: [TC-42-04, TC-42-05, TC-42-06]
  AC-05: [TC-42-09, TC-42-10]
  AC-06: []  # 编译通过由 Gate R01 覆盖
  AC-07: []  # DAG 验证由 Gate R05 覆盖

# ─── Gate R09 配置 ─────────────────────────────────────────────────
gate_r09:
  p0_required: true
  p1_coverage_target: 0.7
  p2_skip: true
  test_class: "SuperAdminMechanismTest"
  note: "本 Phase 为机制 Phase，验证 TenantLineHandler 跳过过滤、SecurityUtils.isSuperAdmin()、X-Tenant-Id header 切换行为，无新增 HTTP 接口"
