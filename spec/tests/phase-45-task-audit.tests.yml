# Phase 45 — Task Audit 测试契约
# 关联 Spec：spec/phase/phase-45.md

phase: 45
module: "task-audit"
ac_ref: "spec/phase/phase-45.md"

tests:

  # ─── P0：安全测试 ───────────────────────────────────────────────
  - id: TC-45-01
    priority: P0
    category: security
    scenario: "无 Token 访问任务审计 → 401"
    request:
      method: GET
      path: /api/v1/tasks/audit
      auth: none
    expect:
      status: 401

  - id: TC-45-02
    priority: P0
    category: security
    scenario: "无权限 Token 查询审计日志 → 403"
    request:
      method: GET
      path: /api/v1/tasks/audit
      auth: token_without_permission
    expect:
      status: 403

  # ─── P0：任务审计 ──────────────────────────────────────────────
  - id: TC-45-03
    priority: P0
    category: audit
    ac: AC-01
    scenario: "任务执行成功记录审计日志"
    setup:
      - create_scheduled_task
    steps:
      - "触发任务执行"
      - "任务执行成功"
    expect:
      db_assert: "SELECT status FROM task_audit_log WHERE task_id={taskId} → SUCCESS"

  - id: TC-45-04
    priority: P0
    category: audit
    ac: AC-01
    scenario: "任务执行失败记录审计日志"
    setup:
      - create_scheduled_task
      - mock_task_failure
    steps:
      - "触发任务执行"
      - "任务执行失败"
    expect:
      db_assert: "SELECT status, error_message FROM task_audit_log WHERE task_id={taskId} → FAILED, NOT NULL"

  - id: TC-45-05
    priority: P0
    category: audit
    ac: AC-02
    scenario: "审计日志包含执行时长"
    setup:
      - create_scheduled_task
    steps:
      - "触发任务执行"
      - "任务执行完成"
    expect:
      db_assert: "SELECT execution_time FROM task_audit_log WHERE task_id={taskId} → > 0"

  - id: TC-45-06
    priority: P0
    category: audit
    ac: AC-03
    scenario: "审计日志包含执行参数"
    setup:
      - create_scheduled_task_with_params
    steps:
      - "触发任务执行"
    expect:
      db_assert: "SELECT params FROM task_audit_log WHERE task_id={taskId} → NOT NULL"

  # ─── P0：审计查询 ──────────────────────────────────────────────
  - id: TC-45-07
    priority: P0
    category: audit
    ac: AC-04
    scenario: "按任务 ID 查询审计日志"
    request:
      method: GET
      path: /api/v1/tasks/audit?taskId={taskId}
      auth: token_with_system:task:audit
    expect:
      status: 200
      body:
        data:
          list: "[指定任务的审计日志]"

  - id: TC-45-08
    priority: P0
    category: audit
    ac: AC-04
    scenario: "按时间范围查询审计日志"
    request:
      method: GET
      path: /api/v1/tasks/audit?startTime={start}&endTime={end}
      auth: token_with_system:task:audit
    expect:
      status: 200
      body:
        data:
          list: "[指定时间范围的审计日志]"

  - id: TC-45-09
    priority: P0
    category: audit
    ac: AC-04
    scenario: "按状态查询审计日志"
    request:
      method: GET
      path: /api/v1/tasks/audit?status=FAILED
      auth: token_with_system:task:audit
    expect:
      status: 200
      body:
        data:
          list: "[所有失败的审计日志]"

  # ─── P0：租户隔离 ───────────────────────────────────────────────
  - id: TC-45-10
    priority: P0
    category: tenant_isolation
    scenario: "租户 A 查不到租户 B 的审计日志"
    setup:
      - create_task_for_tenant_A
      - create_task_for_tenant_B
      - execute_tasks
    request:
      method: GET
      path: /api/v1/tasks/audit
      auth: token_tenant_A
    expect:
      status: 200
      body:
        data:
          list: "[仅包含租户 A 的审计日志]"

  # ─── P1：审计日志清理 ──────────────────────────────────────────
  - id: TC-45-11
    priority: P1
    category: cleanup
    ac: AC-05
    scenario: "定期清理 90 天前的审计日志"
    setup:
      - create_audit_log_91_days_ago
      - create_audit_log_89_days_ago
    steps:
      - "执行清理任务"
    expect:
      db_assert: "SELECT COUNT(*) FROM task_audit_log WHERE created_time < NOW() - INTERVAL '90 days' → 0"

  # ─── P1：数据库结构验证 ─────────────────────────────────────────
  - id: TC-45-12
    priority: P1
    category: db_schema
    ac: AC-06
    scenario: "task_audit_log 表包含 7 列审计字段"
    expect:
      db_assert: "task_audit_log 表包含 tenant_id, created_by, created_time, updated_by, updated_time, deleted, version"

  - id: TC-45-13
    priority: P1
    category: db_schema
    ac: AC-06
    scenario: "task_id 有索引"
    expect:
      db_assert: "task_audit_log 表 task_id 列有索引"

# ─── AC → TC 映射 ──────────────────────────────────────────────────
ac_tc_map:
  AC-01: [TC-45-03, TC-45-04]
  AC-02: [TC-45-05]
  AC-03: [TC-45-06]
  AC-04: [TC-45-07, TC-45-08, TC-45-09]
  AC-05: [TC-45-11]
  AC-06: [TC-45-12, TC-45-13]
  AC-07: []  # 编译检查由 Gate R01 覆盖

# ─── Gate R09 配置 ─────────────────────────────────────────────────
gate_r09:
  p0_required: true
  p1_coverage_target: 0.7
  p2_skip: true
  test_class: "TaskAuditControllerTest"
  note: "本 Phase 包含任务审计记录、查询、清理、租户隔离测试"
