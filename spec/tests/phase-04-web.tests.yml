# Phase 04 — Web Module 测试契约
# 关联 Spec：spec/phase/phase-04.md
# 注：Phase 4 是纯框架层（无 Controller 端点），由编译 + 单元测试覆盖

phase: 4
module: "web"
ac_ref: "spec/phase/phase-04.md"

tests:

  # ─── P0：编译/依赖验证 ────────────────────────────────────────────
  - id: TC-04-01
    priority: P0
    category: compile
    ac: AC-04
    scenario: "ljwx-platform-web 模块编译通过"
    expect:
      gate: R01
      note: "mvn compile -pl ljwx-platform-web 退出码 0"

  - id: TC-04-02
    priority: P0
    category: dependency
    ac: AC-01
    scenario: "pom.xml 声明对 ljwx-platform-security 的依赖"
    expect:
      db_assert: "ljwx-platform-web/pom.xml 含 <artifactId>ljwx-platform-security</artifactId>"

  # ─── P0：异常处理行为验证 ─────────────────────────────────────────
  - id: TC-04-03
    priority: P0
    category: exception_handling
    ac: AC-02
    bl_ref: BL-04-02
    scenario: "AuthenticationException → HTTP 401, Result 格式"
    setup:
      - "调用 GlobalExceptionHandler.handleAuthenticationException()"
    expect:
      status: 401
      body:
        code: 401001
        data: null
        note: "traceId 字段非空"

  - id: TC-04-04
    priority: P0
    category: exception_handling
    ac: AC-02
    bl_ref: BL-04-02
    scenario: "AccessDeniedException → HTTP 403, Result 格式"
    setup:
      - "调用 GlobalExceptionHandler.handleAccessDeniedException()"
    expect:
      status: 403
      body:
        code: 403001
        data: null

  - id: TC-04-05
    priority: P0
    category: exception_handling
    ac: AC-02
    bl_ref: BL-04-03
    scenario: "MethodArgumentNotValidException → HTTP 400, 返回字段级错误"
    setup:
      - "构造含字段校验失败的 MethodArgumentNotValidException"
    expect:
      status: 400
      body:
        code: 400001
        note: "message 包含具体字段名和校验失败原因"

  - id: TC-04-06
    priority: P0
    category: exception_handling
    ac: AC-02
    bl_ref: BL-04-04
    scenario: "未知 Exception → HTTP 500, 不暴露堆栈"
    setup:
      - "调用 GlobalExceptionHandler.handleException(new RuntimeException(\"secret\"))"
    expect:
      status: 500
      body:
        code: 500001
        note: "body 中不含 'secret' 或堆栈信息"

  - id: TC-04-07
    priority: P0
    category: exception_handling
    ac: AC-02
    bl_ref: BL-04-02
    scenario: "BusinessException → HTTP 400, Result 格式"
    setup:
      - "调用 GlobalExceptionHandler.handleBusinessException()"
    expect:
      status: 400
      body:
        code: 400002

  # ─── P1：Result 包装验证 ─────────────────────────────────────────
  - id: TC-04-08
    priority: P1
    category: response_advice
    ac: AC-02
    scenario: "ResponseAdvice 自动包装裸返回值为 Result<T>"
    expect:
      note: "测试类 ResponseAdviceTest：Controller 返回 String → 响应体为 {code:200, data:'...'}"

  # ─── P1：DAG 约束 ─────────────────────────────────────────────────
  - id: TC-04-09
    priority: P1
    category: architecture
    ac: AC-01
    bl_ref: BL-04-01
    scenario: "ljwx-platform-web 不直接 import core，通过 security 传递依赖"
    expect:
      note: "gate-rules.sh 检查 DAG 约束通过"

# ─── AC → TC 映射 ──────────────────────────────────────────────────
ac_tc_map:
  AC-01: [TC-04-02, TC-04-09]
  AC-02: [TC-04-03, TC-04-04, TC-04-05, TC-04-06, TC-04-07, TC-04-08]
  AC-03: []  # 所有 ErrorCode 由 TC-04-03~07 间接覆盖
  AC-04: [TC-04-01]

# ─── Gate R09 配置 ─────────────────────────────────────────────────
gate_r09:
  p0_required: true
  p1_coverage_target: 0.5
  p2_skip: true
  test_class: "GlobalExceptionHandlerTest"
  note: "Phase 4 是框架层，无 Controller；测试通过单元测试覆盖异常处理器行为"
