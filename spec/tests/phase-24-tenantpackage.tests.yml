# Phase 24 — Tenant Package / Notice Read / Import Export 测试契约
# 关联 Spec：spec/phase/phase-24.md
# 测试类：TenantPackageControllerTest.java, NoticeReadControllerTest.java, UserImportExportControllerTest.java

phase: 24
module: "tenantpackage-notice-importexport"
ac_ref: "spec/phase/phase-24.md"

tests:

  # ─── P0：安全测试 ───────────────────────────────────────────────
  - id: TC-24-01
    priority: P0
    category: security
    ac: AC-02
    scenario: "无 Token 访问套餐列表 → 401"
    request:
      method: GET
      path: /api/v1/tenant-packages
      auth: none
    expect:
      status: 401

  - id: TC-24-02
    priority: P0
    category: security
    ac: AC-02
    scenario: "无 Token 访问用户导出 → 401"
    request:
      method: GET
      path: /api/v1/users/export
      auth: none
    expect:
      status: 401

  - id: TC-24-03
    priority: P0
    category: security
    ac: AC-02
    scenario: "缺 system:tenant-package:list 权限 → 403"
    request:
      method: GET
      path: /api/v1/tenant-packages
      auth: valid_token
      missing_perm: "system:tenant-package:list"
    expect:
      status: 403

  - id: TC-24-04
    priority: P0
    category: security
    ac: AC-02
    scenario: "缺 system:tenant-package:create 权限 → 403"
    request:
      method: POST
      path: /api/v1/tenant-packages
      auth: valid_token
      missing_perm: "system:tenant-package:create"
      body:
        name: "测试套餐"
        maxUsers: 50
    expect:
      status: 403

  - id: TC-24-05
    priority: P0
    category: security
    ac: AC-02
    scenario: "缺 system:tenant-package:update 权限 → 403"
    request:
      method: PUT
      path: /api/v1/tenant-packages/1
      auth: valid_token
      missing_perm: "system:tenant-package:update"
      body:
        name: "套餐改名"
    expect:
      status: 403

  - id: TC-24-06
    priority: P0
    category: security
    ac: AC-02
    scenario: "缺 system:tenant-package:delete 权限 → 403"
    request:
      method: DELETE
      path: /api/v1/tenant-packages/1
      auth: valid_token
      missing_perm: "system:tenant-package:delete"
    expect:
      status: 403

  - id: TC-24-07
    priority: P0
    category: security
    ac: AC-02
    scenario: "缺 system:user:export 权限 → 403"
    request:
      method: GET
      path: /api/v1/users/export
      auth: valid_token
      missing_perm: "system:user:export"
    expect:
      status: 403

  - id: TC-24-08
    priority: P0
    category: security
    ac: AC-02
    scenario: "缺 system:notice:read 权限标记已读 → 403"
    request:
      method: PUT
      path: /api/v1/notices/1/read
      auth: valid_token
      missing_perm: "system:notice:read"
    expect:
      status: 403

  # ─── P0：租户套餐 CRUD ──────────────────────────────────────────
  - id: TC-24-09
    priority: P0
    category: crud
    ac: AC-01
    scenario: "正常创建租户套餐，返回套餐 ID"
    request:
      method: POST
      path: /api/v1/tenant-packages
      auth: full_perm_token
      body:
        name: "基础套餐"
        menuIds: "1,2,3"
        maxUsers: 50
        maxStorageMb: 512
        status: 1
    expect:
      status: 200
      body:
        data: "${type: Long}"

  - id: TC-24-10
    priority: P0
    category: crud
    ac: AC-01
    scenario: "正常查询套餐分页列表"
    request:
      method: GET
      path: /api/v1/tenant-packages
      auth: full_perm_token
      params:
        page: 1
        size: 10
    expect:
      status: 200
      body:
        data.total: "${gte: 0}"
        data.list: "${type: List}"

  - id: TC-24-11
    priority: P0
    category: crud
    ac: AC-01
    scenario: "正常查询套餐详情"
    setup:
      create_package: true
    request:
      method: GET
      path: /api/v1/tenant-packages/{id}
      auth: full_perm_token
    expect:
      status: 200
      body:
        data.id: "${not_null}"
        data.name: "${not_null}"
        data.maxUsers: "${not_null}"

  - id: TC-24-12
    priority: P0
    category: crud
    ac: AC-01
    scenario: "正常更新套餐名称，再次查询验证变更"
    setup:
      create_package: true
    request:
      method: PUT
      path: /api/v1/tenant-packages/{id}
      auth: full_perm_token
      body:
        name: "标准套餐(改)"
        maxUsers: 100
    expect:
      status: 200
      assert: "GET /api/v1/tenant-packages/{id} → data.name='标准套餐(改)'"

  - id: TC-24-13
    priority: P0
    category: crud
    ac: AC-01
    scenario: "正常软删除套餐，删除后列表不可见"
    setup:
      create_package: true
    request:
      method: DELETE
      path: /api/v1/tenant-packages/{id}
      auth: full_perm_token
    expect:
      status: 200
      assert: "GET /api/v1/tenant-packages/{id} → 404 或列表不包含该条目"

  - id: TC-24-14
    priority: P0
    category: business
    ac: AC-01
    scenario: "软删除验证 — 数据库 deleted=TRUE"
    setup:
      create_package: true
      delete_via_api: true
    expect:
      db_assert: "SELECT deleted FROM sys_tenant_package WHERE id=? → TRUE"

  # ─── P0：通知已读 ───────────────────────────────────────────────
  - id: TC-24-15
    priority: P0
    category: business
    ac: AC-03
    bl_ref: BL-24-02
    scenario: "标记通知已读，sys_notice_user 记录 read_time 非 NULL"
    setup:
      create_notice: true
    request:
      method: PUT
      path: /api/v1/notices/{notice_id}/read
      auth: full_perm_token
    expect:
      status: 200
      db_assert: "SELECT read_time FROM sys_notice_user WHERE notice_id=? AND user_id=? → NOT NULL"

  - id: TC-24-16
    priority: P0
    category: business
    ac: AC-03
    bl_ref: BL-24-02
    scenario: "标记已读幂等 — 二次调用不更新 read_time（首次已读时间不变）"
    setup:
      create_notice: true
      mark_read_once: true
      capture_read_time: true
    request:
      method: PUT
      path: /api/v1/notices/{notice_id}/read
      auth: full_perm_token
    expect:
      status: 200
      assert: "sys_notice_user.read_time 与首次已读时间相同"

  - id: TC-24-17
    priority: P0
    category: crud
    ac: AC-03
    scenario: "GET /api/v1/notices/unread-count 返回正确的未读数量"
    setup:
      create_notices_unread: 3
    request:
      method: GET
      path: /api/v1/notices/unread-count
      auth: full_perm_token
    expect:
      status: 200
      body:
        data: "${gte: 3}"

  # ─── P0：导入导出 ───────────────────────────────────────────────
  - id: TC-24-18
    priority: P0
    category: business
    ac: AC-04
    bl_ref: BL-24-03
    scenario: "GET /api/v1/users/export 响应 Content-Type 为 Excel MIME"
    request:
      method: GET
      path: /api/v1/users/export
      auth: full_perm_token
    expect:
      status: 200
      headers:
        Content-Type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"
        Content-Disposition: "${contains: attachment}"

  - id: TC-24-19
    priority: P0
    category: business
    ac: AC-05
    bl_ref: BL-24-04
    scenario: "POST /api/v1/users/import 导入有效 Excel 文件 → 成功"
    request:
      method: POST
      path: /api/v1/users/import
      auth: full_perm_token
      content_type: multipart/form-data
      file: "valid_users_10rows.xlsx"
    expect:
      status: 200
      body:
        data.successCount: "${gte: 1}"
        data.errors: "${type: List}"

  - id: TC-24-20
    priority: P0
    category: business
    ac: AC-05
    bl_ref: BL-24-04
    scenario: "导入超 1000 行 Excel → 业务异常 400"
    request:
      method: POST
      path: /api/v1/users/import
      auth: full_perm_token
      content_type: multipart/form-data
      file: "users_1001rows.xlsx"
    expect:
      status: 400
      error_code: "IMPORT_ROW_LIMIT_EXCEEDED"

  # ─── P1：参数校验 ───────────────────────────────────────────────
  - id: TC-24-21
    priority: P1
    category: validation
    scenario: "创建套餐：name 为 null → 400"
    request:
      method: POST
      path: /api/v1/tenant-packages
      auth: full_perm_token
      body:
        name: null
        maxUsers: 50
    expect:
      status: 400

  - id: TC-24-22
    priority: P1
    category: validation
    scenario: "创建套餐：name 超长（65字符）→ 400"
    request:
      method: POST
      path: /api/v1/tenant-packages
      auth: full_perm_token
      body:
        name: "${length: 65}"
        maxUsers: 50
    expect:
      status: 400

  - id: TC-24-23
    priority: P1
    category: validation
    scenario: "创建套餐：maxUsers < 1 → 400"
    request:
      method: POST
      path: /api/v1/tenant-packages
      auth: full_perm_token
      body:
        name: "测试套餐"
        maxUsers: 0
    expect:
      status: 400

  - id: TC-24-24
    priority: P1
    category: validation
    scenario: "查询不存在的套餐 → 404"
    request:
      method: GET
      path: /api/v1/tenant-packages/99999999999
      auth: full_perm_token
    expect:
      status: 404

  - id: TC-24-25
    priority: P1
    category: validation
    scenario: "导入非 xlsx 文件（.csv）→ 400"
    request:
      method: POST
      path: /api/v1/users/import
      auth: full_perm_token
      content_type: multipart/form-data
      file: "users.csv"
    expect:
      status: 400
      error_code: "INVALID_FILE_TYPE"

  - id: TC-24-26
    priority: P1
    category: business
    scenario: "创建套餐：tenantId 传入被忽略，不影响实际 tenant 数据"
    request:
      method: POST
      path: /api/v1/tenant-packages
      auth: full_perm_token
      body:
        name: "测试套餐"
        maxUsers: 50
        tenantId: 99999
    expect:
      status: 200
      assert: "tenantId 参数被忽略，套餐仅归属当前请求 tenant"

  - id: TC-24-27
    priority: P1
    category: business
    scenario: "导入 Excel 含缺失 username 行 → 错误行记录在 errors，其余行成功"
    request:
      method: POST
      path: /api/v1/users/import
      auth: full_perm_token
      content_type: multipart/form-data
      file: "users_with_missing_username.xlsx"
    expect:
      status: 200
      body:
        data.errors: "${size_gte: 1}"
        data.successCount: "${gte: 0}"

  # ─── P2：租户隔离 ───────────────────────────────────────────────
  - id: TC-24-28
    priority: P2
    category: business
    scenario: "租户隔离 — 租户 A 查询不返回租户 B 的套餐"
    setup:
      tenant_a_package: true
      tenant_b_package: true
    request:
      method: GET
      path: /api/v1/tenant-packages
      auth: tenant_a_token
    expect:
      status: 200
      assert: "response.data.list 中无 tenant_b 的套餐数据"

# ─── AC → TC 映射 ──────────────────────────────────────────────────
ac_tc_map:
  AC-01: [TC-24-09, TC-24-10, TC-24-11, TC-24-12, TC-24-13, TC-24-14]
  AC-02: [TC-24-01, TC-24-02, TC-24-03, TC-24-04, TC-24-05, TC-24-06, TC-24-07, TC-24-08]
  AC-03: [TC-24-15, TC-24-16, TC-24-17]
  AC-04: [TC-24-18]
  AC-05: [TC-24-19, TC-24-20, TC-24-27]
  AC-06: [TC-24-26]
  AC-07: []  # 编译和 type-check 由 gate 脚本验证

# ─── Gate R09 配置 ─────────────────────────────────────────────────
gate_r09:
  p0_required: true
  p1_coverage_target: 0.7
  p2_skip: true
  test_classes:
    - "TenantPackageControllerTest"
    - "NoticeReadControllerTest"
    - "UserImportExportControllerTest"
