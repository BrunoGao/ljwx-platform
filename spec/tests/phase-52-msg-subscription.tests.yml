# Phase 52 — 消息中台 - 订阅管理 测试契约
# 关联 Spec：spec/phase/phase-52.md
# API 前缀：/api/v1/message/subscriptions

phase: 52
module: "msg-subscription"
ac_ref: "spec/phase/phase-52.md"

tests:

  # ─── P0：安全测试 ───────────────────────────────────────────────
  - id: TC-52-01
    priority: P0
    category: security
    scenario: "无 Token 访问订阅管理 → 401"
    request:
      method: GET
      path: /api/v1/message/subscriptions
      auth: none
    expect:
      status: 401

  - id: TC-52-02
    priority: P0
    category: security
    scenario: "无权限 Token 创建订阅 → 403"
    request:
      method: POST
      path: /api/v1/message/subscriptions
      auth: token_without_permission
    expect:
      status: 403

  # ─── P0：订阅 CRUD ─────────────────────────────────────────────
  - id: TC-52-03
    priority: P0
    category: crud
    ac: AC-01
    scenario: "用户订阅消息模板"
    request:
      method: POST
      path: /api/v1/message/subscriptions
      auth: token_with_system:message:subscription:add
      body:
        userId: 1001
        templateId: 10
        channel: "EMAIL"
        status: "ACTIVE"
        preference: "{\"frequency\":\"DAILY\"}"
    expect:
      status: 200
      body:
        code: 200
        data: "{subscriptionId}"

  - id: TC-52-04
    priority: P0
    category: crud
    ac: AC-01
    scenario: "查询订阅列表"
    request:
      method: GET
      path: /api/v1/message/subscriptions
      auth: token_with_system:message:subscription:list
    expect:
      status: 200
      body:
        code: 200
        data:
          list: "[订阅列表]"

  - id: TC-52-05
    priority: P0
    category: crud
    ac: AC-01
    scenario: "查询订阅详情"
    request:
      method: GET
      path: /api/v1/message/subscriptions/{subscriptionId}
      auth: token_with_system:message:subscription:query
    expect:
      status: 200
      body:
        code: 200
        data:
          userId: 1001
          templateId: 10
          channel: "EMAIL"
          status: "ACTIVE"

  - id: TC-52-06
    priority: P0
    category: crud
    ac: AC-01
    scenario: "更新订阅信息"
    request:
      method: PUT
      path: /api/v1/message/subscriptions/{subscriptionId}
      auth: token_with_system:message:subscription:edit
      body:
        channel: "SMS"
        preference: "{\"frequency\":\"WEEKLY\"}"
    expect:
      status: 200
      body:
        code: 200

  - id: TC-52-07
    priority: P0
    category: crud
    scenario: "删除订阅（软删除）"
    request:
      method: DELETE
      path: /api/v1/message/subscriptions/{subscriptionId}
      auth: token_with_system:message:subscription:delete
    expect:
      status: 200
      body:
        code: 200
      db_assert: "SELECT deleted FROM msg_subscription WHERE id={subscriptionId} → TRUE"

  # ─── P0：业务规则 ──────────────────────────────────────────────
  - id: TC-52-08
    priority: P0
    category: business
    ac: AC-02
    scenario: "同一用户+模板+渠道组合重复订阅 → 400（唯一约束）"
    setup:
      - create_subscription_user_1001_template_10_EMAIL
    request:
      method: POST
      path: /api/v1/message/subscriptions
      auth: token_with_system:message:subscription:add
      body:
        userId: 1001
        templateId: 10
        channel: "EMAIL"
        status: "ACTIVE"
    expect:
      status: 400
      body:
        code: 400002
        message: "该用户已订阅此模板的此渠道"

  # ─── P0：订阅状态管理 ────────────────────────────────────────
  - id: TC-52-09
    priority: P0
    category: status
    ac: AC-03
    scenario: "更新订阅状态：ACTIVE → INACTIVE"
    request:
      method: PUT
      path: /api/v1/message/subscriptions/{subscriptionId}/status
      auth: token_with_system:message:subscription:edit
      query:
        status: "INACTIVE"
    expect:
      status: 200
      body:
        code: 200
      db_assert: "SELECT status FROM msg_subscription WHERE id={subscriptionId} → INACTIVE"

  - id: TC-52-10
    priority: P0
    category: status
    ac: AC-03
    scenario: "更新订阅状态：INACTIVE → ACTIVE"
    request:
      method: PUT
      path: /api/v1/message/subscriptions/{subscriptionId}/status
      auth: token_with_system:message:subscription:edit
      query:
        status: "ACTIVE"
    expect:
      status: 200
      body:
        code: 200
      db_assert: "SELECT status FROM msg_subscription WHERE id={subscriptionId} → ACTIVE"

  # ─── P0：订阅偏好 ────────────────────────────────────────────
  - id: TC-52-11
    priority: P0
    category: preference
    ac: AC-04
    scenario: "JSONB 偏好设置正确存储并可查询"
    request:
      method: POST
      path: /api/v1/message/subscriptions
      auth: token_with_system:message:subscription:add
      body:
        userId: 1002
        templateId: 11
        channel: "WECHAT"
        status: "ACTIVE"
        preference: "{\"frequency\":\"REALTIME\",\"timeRange\":\"09:00-18:00\"}"
    expect:
      status: 200
      db_assert: "SELECT preference FROM msg_subscription WHERE user_id=1002 AND template_id=11 → JSON 包含 frequency 和 timeRange 字段"

  # ─── P0：租户隔离 ───────────────────────────────────────────────
  - id: TC-52-12
    priority: P0
    category: tenant_isolation
    scenario: "租户 A 查不到租户 B 的订阅记录"
    setup:
      - create_subscription_for_tenant_A
      - create_subscription_for_tenant_B
    request:
      method: GET
      path: /api/v1/message/subscriptions
      auth: token_tenant_A
    expect:
      status: 200
      body:
        data:
          list: "[仅包含租户 A 的订阅记录]"

  # ─── P1：多渠道订阅 ─────────────────────────────────────────
  - id: TC-52-13
    priority: P1
    category: business
    ac: AC-02
    scenario: "同一用户+模板可订阅不同渠道（EMAIL 和 SMS 独立记录）"
    request:
      method: POST
      path: /api/v1/message/subscriptions
      auth: token_with_system:message:subscription:add
      body:
        userId: 1001
        templateId: 10
        channel: "SMS"
        status: "ACTIVE"
    expect:
      status: 200
      body:
        code: 200
        data: "{subscriptionId2}"

  # ─── P1：数据库结构验证 ─────────────────────────────────────────
  - id: TC-52-14
    priority: P1
    category: db_schema
    ac: AC-01
    scenario: "msg_subscription 表包含 7 列审计字段，无 IF NOT EXISTS"
    expect:
      db_assert: "msg_subscription 表包含 tenant_id, created_by, created_time, updated_by, updated_time, deleted, version"

  - id: TC-52-15
    priority: P1
    category: db_schema
    ac: AC-02
    scenario: "uk_user_template_channel 唯一约束存在"
    expect:
      db_assert: "msg_subscription 表有 uk_user_template_channel (user_id, template_id, channel) UNIQUE 约束"

# ─── AC → TC 映射 ──────────────────────────────────────────────────
ac_tc_map:
  AC-01: [TC-52-03, TC-52-04, TC-52-05, TC-52-06, TC-52-07, TC-52-14]
  AC-02: [TC-52-08, TC-52-13, TC-52-15]
  AC-03: [TC-52-09, TC-52-10]
  AC-04: [TC-52-11]

# ─── Gate R09 配置 ─────────────────────────────────────────────────
gate_r09:
  p0_required: true
  p1_coverage_target: 0.7
  p2_skip: true
  test_class: "MsgSubscriptionControllerTest"
  note: "本 Phase 包含订阅 CRUD、唯一约束校验、订阅状态管理、JSONB 偏好存储、多渠道订阅、租户隔离测试"
