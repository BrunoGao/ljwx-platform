# Phase 22 — Profile / Login Log / Online Users 测试契约
# 关联 Spec：spec/phase/phase-22.md
# 测试类：LoginLogControllerTest.java, ProfileControllerTest.java, OnlineUserControllerTest.java

phase: 22
module: "profile-loginlog-onlineuser"
ac_ref: "spec/phase/phase-22.md"

tests:

  # ─── P0：安全测试 ───────────────────────────────────────────────
  - id: TC-22-01
    priority: P0
    category: security
    ac: AC-02
    scenario: "无 Token 访问登录日志列表 → 401"
    request:
      method: GET
      path: /api/v1/login-logs
      auth: none
    expect:
      status: 401

  - id: TC-22-02
    priority: P0
    category: security
    ac: AC-02
    scenario: "无 Token 访问在线用户列表 → 401"
    request:
      method: GET
      path: /api/v1/online-users
      auth: none
    expect:
      status: 401

  - id: TC-22-03
    priority: P0
    category: security
    ac: AC-02
    scenario: "无 Token 访问个人中心 → 401"
    request:
      method: GET
      path: /api/v1/profile
      auth: none
    expect:
      status: 401

  - id: TC-22-04
    priority: P0
    category: security
    ac: AC-02
    scenario: "缺 system:log:login:list 权限访问登录日志 → 403"
    request:
      method: GET
      path: /api/v1/login-logs
      auth: valid_token
      missing_perm: "system:log:login:list"
    expect:
      status: 403

  - id: TC-22-05
    priority: P0
    category: security
    ac: AC-02
    scenario: "缺 system:online:list 权限访问在线用户 → 403"
    request:
      method: GET
      path: /api/v1/online-users
      auth: valid_token
      missing_perm: "system:online:list"
    expect:
      status: 403

  - id: TC-22-06
    priority: P0
    category: security
    ac: AC-02
    scenario: "缺 system:online:kickout 权限强制下线 → 403"
    request:
      method: DELETE
      path: /api/v1/online-users/some-token-id
      auth: valid_token
      missing_perm: "system:online:kickout"
    expect:
      status: 403

  # ─── P0：登录日志 CRUD ──────────────────────────────────────────
  - id: TC-22-07
    priority: P0
    category: crud
    ac: AC-01
    scenario: "登录成功后异步写入登录日志，GET /api/v1/login-logs 分页返回"
    setup:
      trigger_login_success: true
    request:
      method: GET
      path: /api/v1/login-logs
      auth: full_perm_token
      params:
        page: 1
        size: 10
    expect:
      status: 200
      body:
        data.total: "${gte: 1}"
        data.list: "${type: List}"
        data.list[0].username: "${not_null}"
        data.list[0].status: 1

  - id: TC-22-08
    priority: P0
    category: crud
    ac: AC-01
    scenario: "登录失败后异步写入登录日志，status=0"
    setup:
      trigger_login_failure: true
    request:
      method: GET
      path: /api/v1/login-logs
      auth: full_perm_token
      params:
        page: 1
        size: 10
    expect:
      status: 200
      assert: "response.data.list 中存在 status=0 的记录"

  # ─── P0：个人中心 ───────────────────────────────────────────────
  - id: TC-22-09
    priority: P0
    category: crud
    ac: AC-03
    scenario: "GET /api/v1/profile 返回当前已认证用户信息"
    request:
      method: GET
      path: /api/v1/profile
      auth: valid_token
    expect:
      status: 200
      body:
        data.id: "${not_null}"
        data.username: "${not_null}"

  - id: TC-22-10
    priority: P0
    category: crud
    ac: AC-03
    scenario: "PUT /api/v1/profile 修改昵称，再次 GET 验证变更生效"
    request:
      method: PUT
      path: /api/v1/profile
      auth: valid_token
      body:
        nickname: "新昵称_Test"
    expect:
      status: 200
      assert: "再次 GET /api/v1/profile → data.nickname='新昵称_Test'"

  - id: TC-22-11
    priority: P0
    category: business
    ac: AC-05
    bl_ref: BL-22-03
    scenario: "修改密码：旧密码错误 → 400 + OLD_PASSWORD_INCORRECT"
    request:
      method: PUT
      path: /api/v1/profile/password
      auth: valid_token
      body:
        oldPassword: "WrongPassword123"
        newPassword: "NewSecure#4567"
    expect:
      status: 400
      error_code: "OLD_PASSWORD_INCORRECT"

  - id: TC-22-12
    priority: P0
    category: business
    ac: AC-05
    bl_ref: BL-22-03
    scenario: "修改密码：旧密码正确 → 200，新密码可登录"
    request:
      method: PUT
      path: /api/v1/profile/password
      auth: valid_token
      body:
        oldPassword: "${LJWX_BOOTSTRAP_ADMIN_INITIAL_PASSWORD}"
        newPassword: "NewSecure#4567"
    expect:
      status: 200
      assert: "使用新密码 POST /api/v1/auth/login → 200"

  # ─── P0：在线用户 ───────────────────────────────────────────────
  - id: TC-22-13
    priority: P0
    category: crud
    ac: AC-06
    bl_ref: BL-22-04
    scenario: "登录后 GET /api/v1/online-users 返回该用户 jti 条目"
    setup:
      login_and_capture_jti: true
    request:
      method: GET
      path: /api/v1/online-users
      auth: full_perm_token
    expect:
      status: 200
      body:
        data: "${type: List}"
      assert: "response.data 中包含登录产生的 jti 条目"

  - id: TC-22-14
    priority: P0
    category: business
    ac: AC-06
    bl_ref: BL-22-04
    scenario: "DELETE /api/v1/online-users/{tokenId} 踢出后，被踢用户 token 再次请求 → 401"
    setup:
      login_and_capture_jti: true
    request:
      method: DELETE
      path: /api/v1/online-users/{jti}
      auth: full_perm_token
    expect:
      status: 200
      assert: "被踢用户 token 请求 GET /api/v1/profile → 401"

  # ─── P0：业务规则 ───────────────────────────────────────────────
  - id: TC-22-15
    priority: P0
    category: business
    ac: AC-04
    bl_ref: BL-22-01
    scenario: "登录日志异步写入验证 — 登录响应时间不受日志写入影响（< 500ms）"
    request:
      method: POST
      path: /api/v1/auth/login
      auth: none
      body:
        username: "admin"
        password: "${LJWX_BOOTSTRAP_ADMIN_INITIAL_PASSWORD}"
    expect:
      status: 200
      assert: "响应时间 < 500ms，后台异步 sys_login_log 记录存在"

  - id: TC-22-16
    priority: P0
    category: business
    ac: AC-05
    bl_ref: BL-22-02
    scenario: "密码脱敏验证 — 日志中 password 字段显示为 ***"
    setup:
      enable_log_capture: true
    request:
      method: PUT
      path: /api/v1/profile/password
      auth: valid_token
      body:
        oldPassword: "${LJWX_BOOTSTRAP_ADMIN_INITIAL_PASSWORD}"
        newPassword: "NewSecure#4567"
    expect:
      status: 200
      assert: "应用日志中不出现明文密码，仅显示 ***"

  # ─── P1：参数校验 ───────────────────────────────────────────────
  - id: TC-22-17
    priority: P1
    category: validation
    scenario: "修改密码：newPassword 为空 → 400"
    request:
      method: PUT
      path: /api/v1/profile/password
      auth: valid_token
      body:
        oldPassword: "${LJWX_BOOTSTRAP_ADMIN_INITIAL_PASSWORD}"
        newPassword: ""
    expect:
      status: 400

  - id: TC-22-18
    priority: P1
    category: validation
    scenario: "修改密码：oldPassword 为 null → 400"
    request:
      method: PUT
      path: /api/v1/profile/password
      auth: valid_token
      body:
        oldPassword: null
        newPassword: "NewSecure#4567"
    expect:
      status: 400

  - id: TC-22-19
    priority: P1
    category: validation
    scenario: "修改个人信息：email 格式错误 → 400"
    request:
      method: PUT
      path: /api/v1/profile
      auth: valid_token
      body:
        email: "invalid-email-format"
    expect:
      status: 400

  - id: TC-22-20
    priority: P1
    category: validation
    scenario: "登录日志：按用户名搜索过滤正常"
    request:
      method: GET
      path: /api/v1/login-logs
      auth: full_perm_token
      params:
        username: "admin"
        page: 1
        size: 10
    expect:
      status: 200
      assert: "response.data.list 中所有记录 username='admin'"

  - id: TC-22-21
    priority: P1
    category: validation
    scenario: "登录日志：按状态搜索（status=0 失败）过滤正常"
    request:
      method: GET
      path: /api/v1/login-logs
      auth: full_perm_token
      params:
        status: 0
        page: 1
        size: 10
    expect:
      status: 200
      assert: "response.data.list 中所有记录 status=0"

  - id: TC-22-22
    priority: P1
    category: business
    scenario: "个人中心：PasswordUpdateDTO 不含 tenantId 字段 — 传入 tenantId 被忽略"
    request:
      method: PUT
      path: /api/v1/profile/password
      auth: valid_token
      body:
        oldPassword: "${LJWX_BOOTSTRAP_ADMIN_INITIAL_PASSWORD}"
        newPassword: "NewSecure#4567"
        tenantId: 99999
    expect:
      status: 200
      assert: "tenantId 参数被忽略，不影响实际 tenant 数据"

# ─── AC → TC 映射 ──────────────────────────────────────────────────
ac_tc_map:
  AC-01: [TC-22-07, TC-22-08]
  AC-02: [TC-22-01, TC-22-02, TC-22-03, TC-22-04, TC-22-05, TC-22-06]
  AC-03: [TC-22-09, TC-22-10]
  AC-04: [TC-22-15]
  AC-05: [TC-22-11, TC-22-12, TC-22-16, TC-22-22]
  AC-06: [TC-22-13, TC-22-14]

# ─── Gate R09 配置 ─────────────────────────────────────────────────
gate_r09:
  p0_required: true
  p1_coverage_target: 0.7
  p2_skip: true
  test_classes:
    - "LoginLogControllerTest"
    - "ProfileControllerTest"
    - "OnlineUserControllerTest"
