# Permissions Registry (SSOT)
# 全平台权限字符串的唯一来源
# 所有 Phase spec 中出现的权限必须来自这里

version: "1.0"
last_updated: "2026-03-01"

# 权限命名标准: {resource}:{action}
# 标准动作: list, query, add, edit, delete, export, import
# 禁止使用: view, update, remove
#
# camelCase 例外（历史约定，不再新增）:
#   - system:user:resetPwd         （重置密码，动词+名词复合）
#   - system:online:forceLogout    （强制下线，动词+名词复合）
#   - tenant:domain:setPrimary     （设置主域名，动词+名词复合）
#   - system:taskLog:*             （任务日志模块，模块名含大写 L）
#   - system:importExport:*        （导入导出中心，模块名含大写 E）
#   - system:openApi:*             （开放 API 管理，模块名含大写 A）
# 新增权限必须使用全小写 snake_case 或全小写 kebab-case。

