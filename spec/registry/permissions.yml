# 权限命名规范
naming_rules:
  standard_actions:
    - list      # 列表查询
    - query     # 详情查询
    - add       # 新增
    - edit      # 编辑
    - delete    # 删除
    - export    # 导出
    - import    # 导入

  deprecated_actions:
    - view      # 已废弃,使用 list 或 query
    - update    # 已废弃,使用 edit
    - remove    # 已废弃,使用 delete

  format: "{resource}:{action}"
  examples:
    - "system:user:list"
    - "system:role:add"
    - "tenant:brand:edit"

