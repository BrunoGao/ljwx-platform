      - "明确 Loki/Prometheus label 白名单和黑名单"
      - "明确缓存三档策略"

  - version: "1.1"
    date: "2026-03-01"
    changes:
      - "修正 cache_strategy.invalidation.channel: cache:evict → cache:invalidation（与 Phase 33 实现对齐）"
      - "data_masking.mask_types 新增 CUSTOM 类型；PHONE 为标准枚举名，MOBILE 为历史别名，以 PHONE 为准"
      - "workflow.dept_leader.notes 修正：Phase 40 → Phase 21（leader_user_id 在 sys_dept 中定义）"
