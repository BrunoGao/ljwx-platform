# 迁移规则
rules:
  version_format: "VNNN__description.sql"
  version_uniqueness: "每个版本号全局唯一,不允许重复"
  ddl_dml_separation: "DDL 和 DML 必须分开,使用不同版本号"
  no_if_not_exists: "建表语句禁止使用 IF NOT EXISTS"
  seed_data_separate: "默认数据必须单独迁移文件,不能在建表文件中"

# 版本号分配策略
allocation_strategy:
  phase_0_32: "V001-V032 (已完成)"
  phase_33_40: "V033-V039 (P0 + P1 部分)"
  phase_41_53: "V040-V060 (P1 剩余,预留)"
  phase_54_plus: "V061+ (P2 及以后)"
