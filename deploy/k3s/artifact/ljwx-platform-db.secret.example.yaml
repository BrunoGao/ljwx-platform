apiVersion: v1
kind: Secret
metadata:
  name: ljwx-platform-db
type: Opaque
stringData:
  DB_USERNAME: "<postgres_user>"
  DB_PASSWORD: "<postgres_password>"
  REDIS_PASSWORD: "<redis_password>"
  JWT_SECRET: "<jwt_secret_32_plus_chars>"
  LJWX_BOOTSTRAP_ADMIN_INITIAL_PASSWORD: "<strong_bootstrap_admin_password>"
  LJWX_BOOTSTRAP_USER_IMPORT_INITIAL_PASSWORD: "<optional_import_fallback_password>"
