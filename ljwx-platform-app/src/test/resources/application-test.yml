spring:
  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/${POSTGRES_DB:ljwx_platform}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration,classpath:db/test-migration
    baseline-on-migrate: false
  quartz:
    auto-startup: false
  cache:
    type: simple

logging:
  level:
    root: WARN

ljwx:
  jwt:
    secret: test-secret-key-for-integration-tests-256-bits-long
    access-token-expiration: 1800
    refresh-token-expiration: 604800
